<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StemCyte Brochure Designer v1</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lato:wght@300;400;700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Lato',sans-serif;background:#111;color:#e0e0e0;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}

/* App layout */
.app{display:flex;height:100vh}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:48px;background:#1a1a1a;border-bottom:1px solid #2a2a2a;flex-shrink:0}
.toolbar .title{font-size:13px;font-weight:700;letter-spacing:0.3px;color:#fff}
.toolbar .subtitle{font-size:11px;color:rgba(255,255,255,0.35);margin-left:8px}

/* Navigation tabs */
.nav-tabs{display:flex;gap:2px;padding:10px 20px;background:#141414;flex-shrink:0;flex-wrap:wrap;justify-content:center}
.nav-tabs button{padding:7px 14px;border:none;background:rgba(255,255,255,0.06);font-family:'Lato',sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,0.35);cursor:pointer;transition:all 0.2s;border-radius:4px;letter-spacing:0.3px}
.nav-tabs button:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6)}
.nav-tabs button.active{background:#6b1a54;color:#fff}

/* Preview area */
.preview-area{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;padding:20px}

/* Page dimensions matching pregnancy guide */
.page{width:260px;height:630px;overflow:hidden;position:relative;flex-shrink:0;display:flex;flex-direction:column;font-family:'Lato',sans-serif}
.spread{display:flex;box-shadow:0 16px 64px rgba(0,0,0,0.4),0 2px 8px rgba(0,0,0,0.2);border-radius:2px;overflow:hidden}
.spread .page{box-shadow:none;border-radius:0}
.single-page{box-shadow:0 16px 64px rgba(0,0,0,0.4),0 2px 8px rgba(0,0,0,0.2);border-radius:2px;overflow:hidden}
.spine{width:1px;background:rgba(0,0,0,0.12);flex-shrink:0;z-index:2}

/* Nav arrows */
.nav-arrows{display:flex;justify-content:center;gap:24px;margin-top:16px;flex-shrink:0;padding-bottom:12px}
.nav-arrows button{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.12);background:transparent;color:rgba(255,255,255,0.5);font-size:16px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center}
.nav-arrows button:hover:not(:disabled){background:rgba(255,255,255,0.08);color:#fff}
.nav-arrows button:disabled{opacity:0.2;cursor:default}
.panel-label{text-align:center;margin-top:8px;font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:0.5px;flex-shrink:0}

/* ===== SIDEBAR ===== */
.sidebar{width:340px;background:#1a1a1a;border-left:1px solid #2a2a2a;overflow-y:auto;flex-shrink:0;transition:width 0.2s}
.sidebar.collapsed{width:0;border-left:none}
.sidebar-toggle{position:fixed;right:0;top:48px;z-index:100;padding:6px 10px;background:#1a1a1a;border:1px solid #2a2a2a;border-right:none;border-radius:4px 0 0 4px;color:rgba(255,255,255,0.5);cursor:pointer;font-size:12px;font-family:'Lato',sans-serif}
.sidebar-toggle:hover{color:#fff;background:#2a2a2a}

.sidebar-section{padding:14px 16px;border-bottom:1px solid #2a2a2a}
.sidebar-section h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.4);margin-bottom:10px}
.field{margin-bottom:10px}
.field label{display:block;font-size:10px;color:rgba(255,255,255,0.5);margin-bottom:3px;letter-spacing:0.3px}
.field textarea,.field input[type="text"]{width:100%;background:#222;border:1px solid #333;border-radius:4px;padding:6px 8px;color:#e0e0e0;font-family:'Lato',sans-serif;font-size:11px;resize:vertical;line-height:1.5}
.field textarea{min-height:48px}
.field textarea:focus,.field input:focus{outline:none;border-color:#6b1a54}
.field input[type="range"]{width:100%;accent-color:#6b1a54}
.field .range-val{font-size:10px;color:rgba(255,255,255,0.4);float:right}

/* Style controls */
.color-options{display:flex;gap:4px;flex-wrap:wrap}
.color-swatch{width:28px;height:28px;border-radius:4px;border:2px solid transparent;cursor:pointer;transition:all 0.15s}
.color-swatch:hover{transform:scale(1.1)}
.color-swatch.active{border-color:#fff;box-shadow:0 0 0 1px rgba(255,255,255,0.3)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.toggle-row label{font-size:11px;color:rgba(255,255,255,0.6)}
.toggle-switch{width:36px;height:20px;background:#333;border-radius:10px;position:relative;cursor:pointer;transition:background 0.2s}
.toggle-switch.on{background:#6b1a54}
.toggle-switch::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left 0.2s}
.toggle-switch.on::after{left:18px}

/* Export button */
.export-btn{width:100%;padding:10px;background:linear-gradient(160deg,#6b1a54,#3D0F31);color:#fff;border:none;border-radius:6px;font-family:'Lato',sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.3px;transition:opacity 0.2s}
.export-btn:hover{opacity:0.9}

/* ===== BROCHURE PAGE STYLES (matching pregnancy guide) ===== */
:root{
  --plum:#6b1a54;--plum-dark:#3D0F31;--plum-light:#F3F0F8;--plum-10:rgba(107,26,84,0.08);
  --cream:#FAF9F7;--sand:#FAF7F2;--lav:#F3F0F8;--lav-deep:#EDE8F5;
  --sage:#b3508a;--teal:#2A9D8F;--amber:#d98d9a;
  --muted:#7A756E;--body:#4A4740;--border:#E8E2DC;
}

/* Brochure page content classes */
.pg{padding:20px 18px;display:flex;flex-direction:column;overflow:hidden;height:100%}
.pg .lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.pg h2{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;line-height:1.25;margin-bottom:7px;color:#2C2A26}
.pg h3{font-family:'Playfair Display',serif;font-size:12.5px;font-weight:600;line-height:1.25;margin-bottom:5px;color:#2C2A26}
.pg h4{font-size:9.5px;font-weight:700;margin-top:8px;margin-bottom:3px;letter-spacing:0.2px;color:#2C2A26}
.pg p{font-size:9px;line-height:1.6;color:#4A4740}
.pg li{font-size:8.5px;line-height:1.55;color:#4A4740;margin-bottom:2px}
.pg ul{padding-left:12px;margin-top:3px}

.pg .div{height:1px;background:#E8E2DC;margin:10px 0}
.pg .card{border-radius:7px;padding:10px 12px;margin-top:7px;border:1px solid #E8E2DC;background:rgba(255,255,255,0.6)}
.pg .card h5{font-size:7.5px;font-weight:700;margin-bottom:2px;text-transform:uppercase;letter-spacing:0.5px;color:#6b1a54}
.pg .card p{font-size:8.5px;line-height:1.5;color:#7A756E}
.pg .alert{border-left:3px solid #6b1a54;padding:9px 11px;border-radius:0 7px 7px 0;margin-top:8px;background:rgba(107,26,84,0.03)}
.pg .alert h5{font-size:7.5px;font-weight:700;margin-bottom:2px;text-transform:uppercase;letter-spacing:0.5px;color:#6b1a54}
.pg .alert p{font-size:8px;color:#4A4740}
.pg .stats-row{display:flex;gap:6px;margin:8px 0}
.pg .stats-row .stat{flex:1;text-align:center;padding:9px 4px;background:rgba(107,26,84,0.04);border-radius:7px}
.pg .stats-row .stat .v{font-family:'Source Serif 4',serif;font-size:16px;font-weight:700;color:#6b1a54;display:block;margin-bottom:2px}
.pg .stats-row .stat .l{font-size:6.5px;color:#7A756E;text-transform:uppercase;letter-spacing:0.3px;line-height:1.3}
.pg .chk{display:flex;gap:6px;margin-bottom:5px;align-items:flex-start}
.pg .chk .dot{width:5px;height:5px;min-width:5px;border-radius:50%;background:#6b1a54;margin-top:4px;opacity:0.35}
.pg .chk p{font-size:8.5px;line-height:1.45;color:#4A4740}
.pg .pullquote{padding:12px 14px;margin:10px 0;border-left:2px solid #6b1a54}
.pg .pullquote p{font-family:'Playfair Display',serif;font-size:11px;font-style:italic;line-height:1.5;color:#2C2A26}
.pg .pullquote .attr{font-family:'Lato',sans-serif;font-size:7.5px;font-style:normal;color:#7A756E;margin-top:4px}

.pg .section-hdr{margin:-20px -18px 12px;padding:14px 18px 9px}
.pg .badge{display:inline-block;font-size:7px;font-weight:700;padding:3px 8px;border-radius:100px;letter-spacing:0.4px}

.pg .tl-entry{position:relative;padding-left:16px;margin-bottom:8px}
.pg .tl-entry::before{content:'';position:absolute;left:4px;top:10px;bottom:-4px;width:1.5px;background:#E8E2DC}
.pg .tl-entry:last-of-type::before{display:none}
.pg .tl-dot{position:absolute;left:0;top:5px;width:9px;height:9px;border-radius:50%;border:2px solid #FAF9F7;box-shadow:0 0 0 1px #E8E2DC;background:#6b1a54}

.pg .price-tier{padding:8px 0;border-bottom:1px solid #E8E2DC}
.pg .price-tier:last-child{border-bottom:none}
.pg .price-tier .tier-name{font-size:9.5px;font-weight:700;color:#2C2A26}
.pg .price-tier .tier-price{font-family:'Source Serif 4',serif;font-size:15px;font-weight:700;color:#6b1a54;margin:2px 0}
.pg .price-tier .tier-desc{font-size:8px;color:#7A756E;line-height:1.5}

.pg .ghost{position:absolute;right:12px;top:6px;font-family:'Source Serif 4',serif;font-size:48px;font-weight:700;opacity:0.03;line-height:1;pointer-events:none}

.pg .img-block{width:calc(100% + 36px);margin-left:-18px;overflow:hidden;flex-shrink:0}
.pg .img-block img{width:100%;height:100%;object-fit:cover;display:block}
.pg .img-block.top{margin-top:-20px;margin-bottom:12px}
.pg .img-block.bottom{margin-bottom:-20px;margin-top:auto}

.pg .cta-block{margin-top:auto;padding:12px 14px;text-align:center;background:linear-gradient(160deg,#6b1a54,#3D0F31);border-radius:10px;color:#fff}
.pg .cta-block .cta-head{font-family:'Playfair Display',serif;font-size:12px;font-weight:600;margin-bottom:3px}
.pg .cta-block .cta-phone{font-size:11px;font-weight:700;margin:3px 0;letter-spacing:0.5px}
.pg .cta-block .cta-url{font-size:8px;color:rgba(255,255,255,0.4)}

/* Plum background overrides */
.pg.plum-bg{background:linear-gradient(160deg,#6b1a54,#3D0F31);color:#fff}
.pg.plum-bg h2,.pg.plum-bg h3,.pg.plum-bg h4{color:#fff}
.pg.plum-bg p,.pg.plum-bg li{color:rgba(255,255,255,0.5)}
.pg.plum-bg .lbl{color:rgba(255,255,255,0.25)}
.pg.plum-bg .div{background:rgba(255,255,255,0.08)}
.pg.plum-bg .card{border-color:rgba(255,255,255,0.08);background:rgba(255,255,255,0.05)}
.pg.plum-bg .card h5{color:rgba(255,255,255,0.45)}
.pg.plum-bg .card p{color:rgba(255,255,255,0.4)}
.pg.plum-bg .ghost{color:#fff;opacity:0.04}
.pg.plum-bg .stats-row .stat{background:rgba(255,255,255,0.05)}
.pg.plum-bg .stats-row .stat .v{color:rgba(255,255,255,0.7)}
.pg.plum-bg .stats-row .stat .l{color:rgba(255,255,255,0.3)}
.pg.plum-bg .chk .dot{background:rgba(255,255,255,0.3)}
.pg.plum-bg .chk p{color:rgba(255,255,255,0.5)}
.pg.plum-bg .tl-dot{border-color:#3D0F31;background:rgba(255,255,255,0.5)}
.pg.plum-bg .tl-entry::before{background:rgba(255,255,255,0.1)}
.pg.plum-bg .tl-entry h4{color:rgba(255,255,255,0.8)}

/* Cover page */
.pg-cover{background:linear-gradient(160deg,#6b1a54,#3D0F31);color:#fff;display:flex;flex-direction:column;padding:0;height:100%}
.pg-cover .cover-img{width:100%;height:44%;object-fit:cover;object-position:center 30%;display:block;flex-shrink:0}
.pg-cover .cover-content{flex:1;padding:22px 20px 18px;display:flex;flex-direction:column}

/* Back cover */
.pg-back{background:#FAF7F2;padding:24px 22px;display:flex;flex-direction:column;align-items:center;text-align:center;justify-content:center;height:100%}
</style>
</head>

function TextField({ label, value, onChange, multiline }) {
  if (multiline) {
    return (
      <div className="field">
        <label>{label}</label>
        <textarea value={value || ''} onChange={e => onChange(e.target.value)} rows={3} />
      </div>
    );
  }
  return (
    <div className="field">
      <label>{label}</label>
      <input type="text" value={value || ''} onChange={e => onChange(e.target.value)} />
    </div>
  );
}

function RangeField({ label, value, min, max, step, onChange }) {
  return (
    <div className="field">
      <label>{label} <span className="range-val">{value}px</span></label>
      <input type="range" min={min} max={max} step={step || 0.5} value={value} onChange={e => onChange(parseFloat(e.target.value))} />
    </div>
  );
}

function ToggleField({ label, value, onChange }) {
  return (
    <div className="toggle-row">
      <label>{label}</label>
      <div className={`toggle-switch ${value ? 'on' : ''}`} onClick={() => onChange(!value)} />
    </div>
  );
}

// ============================================================
// SIDEBAR CONTENT EDITOR — generates fields based on panel
// ============================================================

function SidebarContent({ panelData, pageIndex, onUpdate }) {
  const pg = panelData.pages[pageIndex];
  if (!pg) return null;
  const els = pg.elements;
  const update = (key, val) => onUpdate(pageIndex, key, val);

  const fields = [];
  // Generate editable fields for all text keys
  Object.keys(els).forEach(key => {
    if (key === 'image' || key === 'showImage' || key === 'showGhost') return;
    const val = els[key];
    if (typeof val !== 'string') return;

    const isLong = val.length > 60 || val.includes('\n');
    const label = key
      .replace(/([A-Z])/g, ' $1')
      .replace(/([0-9]+)/g, ' $1 ')
      .replace(/^\w/, c => c.toUpperCase())
      .trim();
    fields.push(
      <TextField key={key} label={label} value={val} multiline={isLong}
        onChange={v => update(key, v)} />
    );
  });

  return <>{fields}</>;
}

function App() {
  const [panels, setPanels] = useState(JSON.parse(JSON.stringify(PANELS)));
  const [currentPanel, setCurrentPanel] = useState(0);
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [styles, setStyles] = useState({
    bodySize: 9,
    headlineSize: 22,
    padding: 20,
  });
  const [editPageIndex, setEditPageIndex] = useState(0);

  const panel = panels[currentPanel];

  // Keyboard navigation
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowLeft' && currentPanel > 0) setCurrentPanel(currentPanel - 1);
      if (e.key === 'ArrowRight' && currentPanel < panels.length - 1) setCurrentPanel(currentPanel + 1);
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [currentPanel, panels.length]);

  // Reset edit page when panel changes
  useEffect(() => { setEditPageIndex(0); }, [currentPanel]);

  const updateElement = (pageIdx, key, value) => {
    setPanels(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      next[currentPanel].pages[pageIdx].elements[key] = value;
      return next;
    });
  };

  const updateBg = (pageIdx, bgId) => {
    setPanels(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      next[currentPanel].pages[pageIdx].bg = bgId;
      return next;
    });
  };

  const exportPrompt = () => {
    const data = JSON.stringify(panels, null, 2);
    const prompt = `Build a static HTML brochure for StemCyte using the following panel data and styles:\n\nStyles: ${JSON.stringify(styles)}\n\nPanel Data:\n${data}\n\nFollow the StemCyte design system exactly: Playfair Display for headlines, Lato for body, Source Serif 4 for stats. Colors: plum #6b1a54, cream #FAF9F7, sand #FAF7F2, lavender #F3F0F8. Page size 260x630px per panel page. Phone: (866) 389-4659.`;
    navigator.clipboard.writeText(prompt).then(() => {
      alert('Prompt copied to clipboard! Paste into Claude Code for final static build.');
    }).catch(() => {
      // Fallback: open in a textarea
      const w = window.open('', '_blank');
      w.document.write('<textarea style="width:100%;height:100%">' + prompt.replace(/</g,'&lt;') + '</textarea>');
    });
  };

  // Render preview
  const renderPreview = () => {
    if (panel.type === 'single') {
      const pg = panel.pages[0];
      if (currentPanel === 0) {
        return <div className="single-page"><CoverPage els={pg.elements} styles={styles} /></div>;
      }
      if (currentPanel === 6) {
        return <div className="single-page"><BackCoverPage els={pg.elements} /></div>;
      }
    }

    if (panel.type === 'spread') {
      return (
        <div className="spread">
          <ContentPage pageData={panel.pages[0]} panelId={panel.id} pageIndex={0} styles={styles} />
          <div className="spine" />
          <ContentPage pageData={panel.pages[1]} panelId={panel.id} pageIndex={1} styles={styles} />
        </div>
      );
    }

    return null;
  };

  return (
    <div className="app">
      <div className="main">
        <div className="toolbar">
          <div>
            <span className="title">StemCyte Brochure Designer</span>
            <span className="subtitle">v1 · 7 Panels · Interactive</span>

              <div style={{ display: 'flex', gap: 4 }}>
                <button
                  style={{ flex: 1, padding: '6px 8px', border: editPageIndex === 0 ? '1px solid #6b1a54' : '1px solid #333', background: editPageIndex === 0 ? 'rgba(107,26,84,0.2)' : '#222', color: '#e0e0e0', borderRadius: 4, cursor: 'pointer', fontSize: 11, fontFamily: "'Lato',sans-serif", fontWeight: 700 }}
                  onClick={() => setEditPageIndex(0)}>Left Page</button>
                <button
                  style={{ flex: 1, padding: '6px 8px', border: editPageIndex === 1 ? '1px solid #6b1a54' : '1px solid #333', background: editPageIndex === 1 ? 'rgba(107,26,84,0.2)' : '#222', color: '#e0e0e0', borderRadius: 4, cursor: 'pointer', fontSize: 11, fontFamily: "'Lato',sans-serif", fontWeight: 700 }}
                  onClick={() => setEditPageIndex(1)}>Right Page</button>
              </div>
            </div>
          )}

          {/* Content fields */}
          <div className="sidebar-section">
            <h3>Content</h3>
            <SidebarContent panelData={panel} pageIndex={panel.type === 'single' ? 0 : editPageIndex} onUpdate={updateElement} />
          </div>

          {/* Style controls */}
          <div className="sidebar-section">
            <h3>Style Controls</h3>
            <RangeField label="Body text size" value={styles.bodySize} min={7} max={14} step={0.5}
              onChange={v => setStyles(s => ({...s, bodySize: v}))} />
            <RangeField label="Headline size" value={styles.headlineSize} min={14} max={32} step={1}
              onChange={v => setStyles(s => ({...s, headlineSize: v}))} />
          </div>

          {/* Background */}
          <div className="sidebar-section">
            <h3>Background</h3>
            <div className="color-options">
              {BG_PRESETS.map(preset => (
                <div key={preset.id}
                  className={`color-swatch ${panel.pages[panel.type === 'single' ? 0 : editPageIndex].bg === preset.id ? 'active' : ''}`}
                  style={{ background: preset.color, border: preset.color === '#FFFFFF' ? '1px solid #333' : undefined }}
                  title={preset.label}
                  onClick={() => updateBg(panel.type === 'single' ? 0 : editPageIndex, preset.id)}
                />
              ))}
            </div>
          </div>

          {/* Toggles */}
          <div className="sidebar-section">
            <h3>Toggles</h3>
            {panel.pages[panel.type === 'single' ? 0 : editPageIndex].elements.showImage !== undefined && (
              <ToggleField label="Show photography"
                value={panel.pages[panel.type === 'single' ? 0 : editPageIndex].elements.showImage}
                onChange={v => updateElement(panel.type === 'single' ? 0 : editPageIndex, 'showImage', v)} />
            )}
            {panel.pages[panel.type === 'single' ? 0 : editPageIndex].elements.showGhost !== undefined && (
              <ToggleField label="Show ghost numbers"
                value={panel.pages[panel.type === 'single' ? 0 : editPageIndex].elements.showGhost}
                onChange={v => updateElement(panel.type === 'single' ? 0 : editPageIndex, 'showGhost', v)} />
            )}
          </div>
        </>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
