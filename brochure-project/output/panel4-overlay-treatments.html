<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel 4: Plum Wash Gradient Variations</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lato:wght@300;400;700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Lato',sans-serif;background:#0a0a0a;color:#fff;-webkit-font-smoothing:antialiased}
:root{--plum:#6b1a54;--plum-dark:#3D0F31;--cream:#FAF9F7;--muted:#7A756E;--body:#4A4740;--border:#E8E2DC}

.gallery-header{text-align:center;padding:48px 24px 32px}
.gallery-header h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:600;color:#fff;margin-bottom:8px}
.gallery-header p{font-size:13px;color:rgba(255,255,255,0.4);max-width:640px;margin:0 auto}

.gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:32px;padding:0 48px 64px;max-width:1200px;margin:0 auto}

.spread-option{cursor:pointer;transition:transform 0.2s}
.spread-option:hover{transform:translateY(-4px)}
.spread-thumb{overflow:hidden;margin:0 auto;border-radius:4px;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.spread-thumb .spread{transform-origin:top left;transform:scale(0.4)}
.spread-thumb{width:218px;height:282px}
.spread-label{text-align:center;margin-top:10px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.4)}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;align-items:center;justify-content:center;flex-direction:column}
.modal-overlay.active{display:flex}
.modal-content{position:relative}
.modal-content .spread{box-shadow:0 16px 64px rgba(0,0,0,0.5)}
.modal-label{text-align:center;margin-top:16px;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.5)}
.modal-counter{text-align:center;margin-top:6px;font-size:11px;color:rgba(255,255,255,0.25)}
.modal-nav{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.modal-nav:hover{background:rgba(255,255,255,0.12)}
.modal-prev{left:-80px}
.modal-next{right:-80px}
.modal-close{position:absolute;top:24px;right:24px;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:transparent;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1001}

.spread{display:flex;width:544px;height:704px;overflow:hidden;border-radius:2px}
.page{width:272px;height:704px;position:relative;overflow:hidden;flex-shrink:0;font-family:'Lato',sans-serif}
</style>
</head>
<body>

<div class="gallery-header">
  <h1>Plum Wash — All Variations</h1>
  <p>Top section: gradient extent (tight to wide). Bottom section: gradient angle (steep to shallow).</p>
</div>

<div style="text-align:center;padding:8px 24px 16px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.25)">Gradient Extent (tight → wide)</div>
<div class="gallery" id="gallery"></div>

<div style="text-align:center;padding:24px 24px 16px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.25)">Gradient Angle (steep → shallow)</div>
<div class="gallery" id="gallery2"></div>

<div class="modal-overlay" id="modal">
  <button class="modal-close" onclick="closeModal()">&times;</button>
  <div class="modal-content" id="modalContent">
    <button class="modal-nav modal-prev" onclick="navModal(-1)">&larr;</button>
    <button class="modal-nav modal-next" onclick="navModal(1)">&rarr;</button>
  </div>
  <div class="modal-label" id="modalLabel"></div>
  <div class="modal-counter" id="modalCounter"></div>
</div>

<script>
const IMG = {
  bailey: '../source-files/bailey_placeholder.jpg',
  ryden: '../source-files/ryden_placeholder.jpg',
};

const B = `Bailey was 3 days old when she had a stroke. Her mom had banked her cord blood with StemCyte. She received her own stem cells and today is healthy and thriving.`;
const R = `After oxygen deprivation caused brain damage, his family banked their next child's cord blood with StemCyte and used it in a clinical trial six months later.`;
const Q = `"It's better to save it and not need it than not have it when you need it."`;
const QA = `— Rebecca, Bailey's mom`;

const baileyText = `
  <div style="font-size:7px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:5px">OWN CELLS</div>
  <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:#fff;margin-bottom:3px;line-height:1.15">Bailey Coates</div>
  <div style="font-size:7.5px;color:rgba(255,255,255,0.4);margin-bottom:8px">Perinatal Stroke</div>
  <p style="font-size:8.5px;line-height:1.6;color:rgba(255,255,255,0.6)">${B}</p>
  <div style="margin-top:12px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.1)">
    <div style="font-family:'Playfair Display',serif;font-style:italic;font-size:9px;line-height:1.5;color:rgba(255,255,255,0.55)">${Q}</div>
    <div style="font-size:7px;color:rgba(255,255,255,0.28);margin-top:3px">${QA}</div>
  </div>`;

const rydenText = `
  <div style="font-size:7px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:5px">SIBLING'S CELLS</div>
  <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:#fff;margin-bottom:3px;line-height:1.15">Ryden</div>
  <div style="font-size:7.5px;color:rgba(255,255,255,0.4);margin-bottom:8px">Cerebral Palsy</div>
  <p style="font-size:8.5px;line-height:1.6;color:rgba(255,255,255,0.6)">${R}</p>`;

function makePage(img, text, pos, gradL, gradR) {
  // pos: 'tl' = top-left, 'br' = bottom-right
  const anchor = pos === 'tl'
    ? 'top:0;left:0;padding:22px 18px;max-width:220px'
    : 'bottom:0;right:0;padding:22px 18px;max-width:220px;text-align:right';
  const grad = pos === 'tl' ? gradL : gradR;
  return `<div class="page" style="position:relative">
    <img src="${img}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" alt="">
    <div style="position:absolute;inset:0;background:${grad}"></div>
    <div style="position:absolute;${anchor};color:#fff">${text}</div>
  </div>`;
}

// All 20 variations — just different gradient extends
// Format: [label, baileyGradient, rydenGradient]
const VARIATIONS = [
  // Very tight — just behind text
  ["Tight Hug",
    "linear-gradient(155deg, rgba(61,15,49,0.92) 12%, transparent 30%)",
    "linear-gradient(335deg, rgba(61,15,49,0.92) 12%, transparent 30%)"],

  ["Minimal Pad",
    "linear-gradient(150deg, rgba(61,15,49,0.9) 15%, transparent 34%)",
    "linear-gradient(330deg, rgba(61,15,49,0.9) 15%, transparent 34%)"],

  ["Close Crop",
    "linear-gradient(155deg, rgba(61,15,49,0.9) 18%, transparent 38%)",
    "linear-gradient(335deg, rgba(61,15,49,0.9) 18%, transparent 38%)"],

  ["Snug Fit",
    "linear-gradient(150deg, rgba(61,15,49,0.88) 20%, transparent 40%)",
    "linear-gradient(330deg, rgba(61,15,49,0.88) 20%, transparent 40%)"],

  // Medium-tight
  ["Compact",
    "linear-gradient(152deg, rgba(61,15,49,0.88) 22%, transparent 44%)",
    "linear-gradient(332deg, rgba(61,15,49,0.88) 22%, transparent 44%)"],

  ["Medium Tight",
    "linear-gradient(150deg, rgba(61,15,49,0.87) 24%, transparent 46%)",
    "linear-gradient(330deg, rgba(61,15,49,0.87) 24%, transparent 46%)"],

  ["Balanced Short",
    "linear-gradient(148deg, rgba(61,15,49,0.86) 25%, transparent 48%)",
    "linear-gradient(328deg, rgba(61,15,49,0.86) 25%, transparent 48%)"],

  // Medium
  ["Medium",
    "linear-gradient(150deg, rgba(61,15,49,0.85) 28%, transparent 52%)",
    "linear-gradient(330deg, rgba(61,15,49,0.85) 28%, transparent 52%)"],

  ["Medium Wide",
    "linear-gradient(148deg, rgba(61,15,49,0.85) 30%, transparent 55%)",
    "linear-gradient(328deg, rgba(61,15,49,0.85) 30%, transparent 55%)"],

  ["Half Page",
    "linear-gradient(150deg, rgba(61,15,49,0.84) 32%, transparent 58%)",
    "linear-gradient(330deg, rgba(61,15,49,0.84) 32%, transparent 58%)"],

  // Medium-wide
  ["Generous",
    "linear-gradient(148deg, rgba(61,15,49,0.83) 35%, transparent 60%)",
    "linear-gradient(328deg, rgba(61,15,49,0.83) 35%, transparent 60%)"],

  ["Extended",
    "linear-gradient(150deg, rgba(61,15,49,0.82) 38%, transparent 64%)",
    "linear-gradient(330deg, rgba(61,15,49,0.82) 38%, transparent 64%)"],

  // Wide
  ["Wide Wash",
    "linear-gradient(148deg, rgba(61,15,49,0.82) 40%, transparent 68%)",
    "linear-gradient(328deg, rgba(61,15,49,0.82) 40%, transparent 68%)"],

  ["Broad Sweep",
    "linear-gradient(150deg, rgba(61,15,49,0.8) 42%, transparent 72%)",
    "linear-gradient(330deg, rgba(61,15,49,0.8) 42%, transparent 72%)"],

  ["Deep Reach",
    "linear-gradient(148deg, rgba(61,15,49,0.8) 45%, transparent 75%)",
    "linear-gradient(328deg, rgba(61,15,49,0.8) 45%, transparent 75%)"],

  // Very wide
  ["Expansive",
    "linear-gradient(150deg, rgba(61,15,49,0.78) 48%, transparent 78%)",
    "linear-gradient(330deg, rgba(61,15,49,0.78) 48%, transparent 78%)"],

  ["Cinematic",
    "linear-gradient(148deg, rgba(61,15,49,0.78) 50%, transparent 82%)",
    "linear-gradient(328deg, rgba(61,15,49,0.78) 50%, transparent 82%)"],

  ["Near Full",
    "linear-gradient(150deg, rgba(61,15,49,0.75) 55%, transparent 85%)",
    "linear-gradient(330deg, rgba(61,15,49,0.75) 55%, transparent 85%)"],

  // Almost full coverage
  ["Heavy Wash",
    "linear-gradient(148deg, rgba(61,15,49,0.75) 60%, transparent 90%)",
    "linear-gradient(328deg, rgba(61,15,49,0.75) 60%, transparent 90%)"],

  ["Full Wash",
    "linear-gradient(150deg, rgba(61,15,49,0.72) 65%, transparent 95%)",
    "linear-gradient(330deg, rgba(61,15,49,0.72) 65%, transparent 95%)"],
];

const OPTIONS_EXTENT = VARIATIONS.map(([label, gL, gR]) => ({
  label,
  left: makePage(IMG.bailey, baileyText, 'tl', gL, gR),
  right: makePage(IMG.ryden, rydenText, 'br', gL, gR),
}));

// ANGLE VARIATIONS — same medium extent, different angles
// Bailey: angle goes from top-left corner. Lower deg = more horizontal, higher = more vertical/diagonal
// Using a consistent extent (~25% solid, ~50% fade) and varying the angle
const ANGLES = [
  // Very shallow / nearly horizontal
  ["Nearly Horizontal",
    "linear-gradient(95deg, rgba(61,15,49,0.88) 25%, transparent 50%)",
    "linear-gradient(275deg, rgba(61,15,49,0.88) 25%, transparent 50%)"],

  ["Slight Dip",
    "linear-gradient(100deg, rgba(61,15,49,0.88) 25%, transparent 50%)",
    "linear-gradient(280deg, rgba(61,15,49,0.88) 25%, transparent 50%)"],

  ["Gentle Slope",
    "linear-gradient(105deg, rgba(61,15,49,0.87) 25%, transparent 50%)",
    "linear-gradient(285deg, rgba(61,15,49,0.87) 25%, transparent 50%)"],

  ["Low Angle",
    "linear-gradient(110deg, rgba(61,15,49,0.87) 25%, transparent 50%)",
    "linear-gradient(290deg, rgba(61,15,49,0.87) 25%, transparent 50%)"],

  ["Easy Lean",
    "linear-gradient(115deg, rgba(61,15,49,0.86) 25%, transparent 50%)",
    "linear-gradient(295deg, rgba(61,15,49,0.86) 25%, transparent 50%)"],

  // Mild diagonal
  ["Mild Diagonal",
    "linear-gradient(120deg, rgba(61,15,49,0.86) 25%, transparent 50%)",
    "linear-gradient(300deg, rgba(61,15,49,0.86) 25%, transparent 50%)"],

  ["Soft Tilt",
    "linear-gradient(125deg, rgba(61,15,49,0.85) 25%, transparent 50%)",
    "linear-gradient(305deg, rgba(61,15,49,0.85) 25%, transparent 50%)"],

  ["Moderate",
    "linear-gradient(130deg, rgba(61,15,49,0.85) 25%, transparent 50%)",
    "linear-gradient(310deg, rgba(61,15,49,0.85) 25%, transparent 50%)"],

  ["Classic Lean",
    "linear-gradient(135deg, rgba(61,15,49,0.85) 25%, transparent 50%)",
    "linear-gradient(315deg, rgba(61,15,49,0.85) 25%, transparent 50%)"],

  ["Mid Angle",
    "linear-gradient(140deg, rgba(61,15,49,0.85) 25%, transparent 50%)",
    "linear-gradient(320deg, rgba(61,15,49,0.85) 25%, transparent 50%)"],

  // Steeper
  ["Tilted",
    "linear-gradient(145deg, rgba(61,15,49,0.85) 25%, transparent 50%)",
    "linear-gradient(325deg, rgba(61,15,49,0.85) 25%, transparent 50%)"],

  ["Standard Steep",
    "linear-gradient(150deg, rgba(61,15,49,0.85) 25%, transparent 50%)",
    "linear-gradient(330deg, rgba(61,15,49,0.85) 25%, transparent 50%)"],

  ["Sharp Lean",
    "linear-gradient(155deg, rgba(61,15,49,0.85) 25%, transparent 50%)",
    "linear-gradient(335deg, rgba(61,15,49,0.85) 25%, transparent 50%)"],

  ["Steep Drop",
    "linear-gradient(160deg, rgba(61,15,49,0.85) 25%, transparent 50%)",
    "linear-gradient(340deg, rgba(61,15,49,0.85) 25%, transparent 50%)"],

  ["High Angle",
    "linear-gradient(165deg, rgba(61,15,49,0.85) 25%, transparent 50%)",
    "linear-gradient(345deg, rgba(61,15,49,0.85) 25%, transparent 50%)"],

  // Very steep / nearly vertical
  ["Near Vertical",
    "linear-gradient(170deg, rgba(61,15,49,0.85) 25%, transparent 50%)",
    "linear-gradient(350deg, rgba(61,15,49,0.85) 25%, transparent 50%)"],

  ["Vertical Lean",
    "linear-gradient(175deg, rgba(61,15,49,0.85) 25%, transparent 50%)",
    "linear-gradient(355deg, rgba(61,15,49,0.85) 25%, transparent 50%)"],

  ["Straight Down",
    "linear-gradient(180deg, rgba(61,15,49,0.85) 25%, transparent 50%)",
    "linear-gradient(0deg, rgba(61,15,49,0.85) 25%, transparent 50%)"],

  // Angled the other way (text side biased)
  ["Reverse Lean",
    "linear-gradient(185deg, rgba(61,15,49,0.85) 25%, transparent 50%)",
    "linear-gradient(5deg, rgba(61,15,49,0.85) 25%, transparent 50%)"],

  ["Wide Reverse",
    "linear-gradient(190deg, rgba(61,15,49,0.85) 25%, transparent 50%)",
    "linear-gradient(10deg, rgba(61,15,49,0.85) 25%, transparent 50%)"],
];

const OPTIONS_ANGLE = ANGLES.map(([label, gL, gR]) => ({
  label,
  left: makePage(IMG.bailey, baileyText, 'tl', gL, gR),
  right: makePage(IMG.ryden, rydenText, 'br', gL, gR),
}));

const ALL = [...OPTIONS_EXTENT, ...OPTIONS_ANGLE];

// Build galleries
function buildGallery(el, opts, offset) {
  opts.forEach((opt, i) => {
    const idx = offset + i;
    const w = document.createElement('div');
    w.className = 'spread-option';
    w.onclick = () => openModal(idx);
    w.innerHTML = `<div class="spread-thumb"><div class="spread" style="width:544px;height:704px;">${opt.left}${opt.right}</div></div><div class="spread-label">${i+1}. ${opt.label}</div>`;
    el.appendChild(w);
  });
}
buildGallery(document.getElementById('gallery'), OPTIONS_EXTENT, 0);
buildGallery(document.getElementById('gallery2'), OPTIONS_ANGLE, OPTIONS_EXTENT.length);

// Modal
let ci = 0;
const modal = document.getElementById('modal');
const mc = document.getElementById('modalContent');
const ml = document.getElementById('modalLabel');
const mn = document.getElementById('modalCounter');
function openModal(i){ci=i;render();modal.classList.add('active');document.body.style.overflow='hidden'}
function closeModal(){modal.classList.remove('active');document.body.style.overflow=''}
function navModal(d){ci=(ci+d+ALL.length)%ALL.length;render()}
function render(){
  const o=ALL[ci],e=mc.querySelector('.spread');if(e)e.remove();
  const s=document.createElement('div');s.className='spread';s.style.cssText='width:544px;height:704px;';
  s.innerHTML=o.left+o.right;mc.insertBefore(s,mc.querySelector('.modal-nav'));
  ml.textContent=`${ci+1}. ${o.label}`;mn.textContent=`${ci+1} of ${ALL.length}`;
}
document.addEventListener('keydown',e=>{if(!modal.classList.contains('active'))return;if(e.key==='Escape')closeModal();if(e.key==='ArrowLeft')navModal(-1);if(e.key==='ArrowRight')navModal(1)});
modal.addEventListener('click',e=>{if(e.target===modal)closeModal()});
</script>
</body>
</html>
