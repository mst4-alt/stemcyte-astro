<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cover Image Crop Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Lato',sans-serif;background:#1a1917;color:#fff;
  padding:40px 20px;-webkit-font-smoothing:antialiased;
  display:flex;gap:60px;justify-content:center;align-items:flex-start;
  min-height:100vh;
}

/* Controls panel */
.controls{
  width:280px;flex-shrink:0;padding-top:20px;
}
.controls h1{
  font-size:13px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,0.25);margin-bottom:32px;font-weight:700;
}
.control-group{margin-bottom:24px}
.control-group label{
  display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;
  color:rgba(255,255,255,0.4);margin-bottom:8px;font-weight:700;
}
.control-group .value{
  font-size:12px;color:rgba(255,255,255,0.6);float:right;font-weight:400;
  letter-spacing:0;text-transform:none;
}
input[type="range"]{
  width:100%;-webkit-appearance:none;height:4px;border-radius:2px;
  background:rgba(255,255,255,0.1);outline:none;
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:#d98d9a;cursor:pointer;
}
.preset-row{display:flex;gap:6px;flex-wrap:wrap}
.preset{
  padding:5px 10px;border:1px solid rgba(255,255,255,0.1);border-radius:100px;
  font-size:10px;color:rgba(255,255,255,0.4);cursor:pointer;background:none;
  font-family:'Lato',sans-serif;letter-spacing:0.5px;
}
.preset:hover{border-color:rgba(217,141,154,0.4);color:rgba(255,255,255,0.6)}
.preset.active{border-color:rgba(217,141,154,0.5);color:#d98d9a;background:rgba(217,141,154,0.08)}

.copy-btn{
  margin-top:32px;width:100%;padding:10px;border:1px solid rgba(217,141,154,0.3);
  border-radius:100px;background:none;color:#d98d9a;font-family:'Lato',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;
}
.copy-btn:hover{background:rgba(217,141,154,0.08)}
.copy-btn.copied{color:#6C1A55;border-color:#6C1A55}

/* Preview */
.preview-wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
.preview-label{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:1px}

.cv{width:272px;height:704px;position:relative;overflow:hidden;border-radius:3px;box-shadow:0 10px 40px rgba(0,0,0,0.4);flex-shrink:0}
.cv .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:all 0.15s ease}
.cv .ov{position:absolute;inset:0}
.cv .ct{position:relative;z-index:2;display:flex;flex-direction:column;justify-content:flex-end;height:100%;padding:32px 24px}
.cv .hl{font-family:'Playfair Display',serif;font-weight:600;line-height:1.15;color:#fff;font-size:42px;margin-bottom:4px}
.cv .banking{font-family:'Lato',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(217,141,154,0.4);margin-bottom:20px}
.cv .tagline{border-left:1.5px solid rgba(217,141,154,0.3);padding-left:12px;font-size:14px;color:rgba(255,255,255,0.5);line-height:1.7;margin-bottom:32px;font-weight:300;font-style:italic}
.cv .divider{height:1px;background:rgba(255,255,255,0.06);margin-bottom:22px}
.cv .logo-row{display:flex;align-items:center;justify-content:space-between}
.cv .logo-row img{height:17px;width:auto;display:block}
</style>
</head>
<body>

<div class="controls">
  <h1>Cover Image Crop</h1>
  
  <div class="control-group">
    <label>Horizontal Position <span class="value" id="xVal">40%</span></label>
    <input type="range" id="posX" min="0" max="100" value="40">
  </div>
  
  <div class="control-group">
    <label>Vertical Position <span class="value" id="yVal">50%</span></label>
    <input type="range" id="posY" min="0" max="100" value="50">
  </div>
  
  <div class="control-group">
    <label>Zoom <span class="value" id="zoomVal">100%</span></label>
    <input type="range" id="zoom" min="100" max="250" value="100">
  </div>

  <div class="control-group">
    <label style="margin-bottom:10px">Presets</label>
    <div class="preset-row">
      <button class="preset active" data-x="40" data-y="50" data-z="100">Current</button>
      <button class="preset" data-x="50" data-y="50" data-z="100">Center</button>
      <button class="preset" data-x="30" data-y="40" data-z="120">Close-up</button>
      <button class="preset" data-x="50" data-y="30" data-z="140">Face</button>
      <button class="preset" data-x="40" data-y="60" data-z="110">Hands</button>
      <button class="preset" data-x="50" data-y="50" data-z="100">Reset</button>
    </div>
  </div>

  <div class="control-group">
    <label>Overlay Gradient</label>
    <div class="preset-row" style="margin-top:8px">
      <button class="preset grad active" data-grad="default">Default</button>
      <button class="preset grad" data-grad="heavier">Heavier</button>
      <button class="preset grad" data-grad="lighter">Lighter</button>
    </div>
  </div>

  <button class="copy-btn" id="copyBtn">Copy CSS Values</button>
  <div style="margin-top:12px;font-size:10px;color:rgba(255,255,255,0.2);text-align:center" id="cssOutput"></div>
</div>

<script>
const bg = document.getElementById('bgImg');
const overlay = document.getElementById('overlay');
const posX = document.getElementById('posX');
const posY = document.getElementById('posY');
const zoom = document.getElementById('zoom');
const xVal = document.getElementById('xVal');
const yVal = document.getElementById('yVal');
const zoomVal = document.getElementById('zoomVal');
const copyBtn = document.getElementById('copyBtn');
const cssOutput = document.getElementById('cssOutput');

const gradients = {
  default: 'linear-gradient(to top,#3D0F31 0%,rgba(61,15,49,0.82) 30%,rgba(61,15,49,0.35) 60%,rgba(0,0,0,0.05) 100%)',
  heavier: 'linear-gradient(to top,#3D0F31 0%,rgba(61,15,49,0.9) 35%,rgba(61,15,49,0.5) 65%,rgba(0,0,0,0.15) 100%)',
  lighter: 'linear-gradient(to top,#3D0F31 0%,rgba(61,15,49,0.7) 25%,rgba(61,15,49,0.2) 55%,transparent 100%)'
};

function update() {
  const x = posX.value;
  const y = posY.value;
  const z = zoom.value;
  xVal.textContent = x + '%';
  yVal.textContent = y + '%';
  zoomVal.textContent = z + '%';
  
  bg.style.objectPosition = x + '% ' + y + '%';
  if (z > 100) {
    const scale = z / 100;
    bg.style.transform = 'scale(' + scale + ')';
    bg.style.transformOrigin = x + '% ' + y + '%';
  } else {
    bg.style.transform = 'none';
  }
  
  cssOutput.textContent = 'object-position:' + x + '% ' + y + '%' + (z > 100 ? '; transform:scale(' + (z/100).toFixed(2) + ')' : '');
}

posX.addEventListener('input', update);
posY.addEventListener('input', update);
zoom.addEventListener('input', update);

document.querySelectorAll('.preset:not(.grad)').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset:not(.grad)').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    posX.value = btn.dataset.x;
    posY.value = btn.dataset.y;
    zoom.value = btn.dataset.z;
    update();
  });
});

document.querySelectorAll('.preset.grad').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset.grad').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    overlay.style.background = gradients[btn.dataset.grad];
  });
});

copyBtn.addEventListener('click', () => {
  const css = cssOutput.textContent;
  navigator.clipboard.writeText(css);
  copyBtn.textContent = 'Copied!';
  copyBtn.classList.add('copied');
  setTimeout(() => {
    copyBtn.textContent = 'Copy CSS Values';
    copyBtn.classList.remove('copied');
  }, 2000);
});

update();
</script>
