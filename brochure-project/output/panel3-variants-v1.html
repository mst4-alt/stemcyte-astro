*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Lato',sans-serif;background:#0a0a0a;color:#fff;-webkit-font-smoothing:antialiased}
.gallery-header{text-align:center;padding:48px 24px 16px}
.gallery-header h1{font-family:Playfair Display,serif;font-size:26px;font-weight:600;color:#fff;margin-bottom:8px}
.gallery-header p{font-size:12px;color:rgba(255,255,255,0.4);max-width:600px;margin:0 auto}
.section-label{text-align:center;padding:32px 0 12px;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.2)}
.gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:28px;padding:0 48px 24px;max-width:1400px;margin:0 auto}
.spread-option{cursor:pointer;transition:transform 0.2s}
.spread-option:hover{transform:translateY(-4px)}
.spread-thumb{overflow:hidden;margin:0 auto;border-radius:4px;width:218px;height:282px;position:relative;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.spread-option:hover .spread-thumb{box-shadow:0 10px 36px rgba(107,26,84,0.35)}
.spread-thumb .spread{transform:scale(0.4);transform-origin:top left;width:544px;height:704px;display:flex;position:absolute;top:0;left:0}
.spread-label{text-align:center;margin-top:10px;font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:rgba(255,255,255,0.4)}
.spread-variant{text-align:center;margin-top:3px;font-size:9px;color:rgba(255,255,255,0.2);text-transform:uppercase;letter-spacing:0.5px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:1000;align-items:center;justify-content:center;flex-direction:column}
.modal-overlay.active{display:flex}
.modal-label{text-align:center;margin-top:14px;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.5)}
.modal-sub{text-align:center;margin-top:4px;font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:0.5px;text-transform:uppercase}
.modal-counter{text-align:center;margin-top:4px;font-size:10px;color:rgba(255,255,255,0.2)}
.modal-nav{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.modal-nav:hover{background:rgba(255,255,255,0.12)}
.modal-prev{left:24px}
.modal-next{right:24px}
.modal-close{position:absolute;top:24px;right:24px;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:transparent;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sp{width:272px;height:704px;position:relative;overflow:hidden;display:flex;flex-direction:column;font-family:'Lato',sans-serif;flex-shrink:0}
.sp .lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:8px}
.sp h3{font-family:Playfair Display,serif;font-weight:600;line-height:1.2;margin-bottom:6px}
.sp .stat-num{font-family:'Source Serif 4',serif;font-weight:700}
.sp .card{border-radius:6px;padding:10px 12px;margin-top:6px;border:1px solid #E8E2DC}
.sp .card h5{font-size:7.5px;font-weight:700;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px}
.sp .card p{font-size:8.5px;line-height:1.5;color:#7A756E}
.sp .hero-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.sp .pill{display:inline-block;font-size:7px;font-weight:700;padding:3px 8px;border-radius:100px;letter-spacing:0.3px;margin:2px 3px 2px 0}
</style>

const sections = [
  { title: 'Big Stats', key: 'bigstats' },
  { title: 'Shared Band', key: 'sharedband' },
  { title: 'Centered Zen', key: 'centeredzen' },
];

const gallery = document.getElementById('gallery');
let allSpreads = [];

sections.forEach(sec => {
  const secSpreads = spreads.filter(s => s.section === sec.key);
  const label = document.createElement('div');
  label.className = 'section-label';
  label.textContent = sec.title + ' — ' + secSpreads.length + ' variants';
  gallery.appendChild(label);
  const grid = document.createElement('div');
  grid.className = 'gallery';
  secSpreads.forEach(spread => {
    const globalIdx = allSpreads.length;
    allSpreads.push(spread);
    const el = document.createElement('div');
    el.className = 'spread-option';
    el.innerHTML =
      '<div class="spread-thumb"><div class="spread">' + spread.render() + '</div></div>' +
      '<div class="spread-label">' + spread.label + '</div>' +
      '<div class="spread-variant">' + spread.variant + '</div>';
    el.addEventListener('click', () => openModal(globalIdx));
    grid.appendChild(el);
  });
  gallery.appendChild(grid);
});

let currentIndex = 0;
const modal = document.getElementById('modal');
const modalSpread = document.getElementById('modalSpread');
const modalLabel = document.getElementById('modalLabel');
const modalSub = document.getElementById('modalSub');
const modalCounter = document.getElementById('modalCounter');

function openModal(i) {
  currentIndex = i;
  renderModal();
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  modal.classList.remove('active');
  document.body.style.overflow = '';
}
function renderModal() {
  const s = allSpreads[currentIndex];
  modalSpread.innerHTML = '<div style="width:544px;height:704px;display:flex">' + s.render() + '</div>';
  modalLabel.textContent = s.label;
  modalSub.textContent = s.variant;
  modalCounter.textContent = (currentIndex + 1) + ' of ' + allSpreads.length;
}
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalPrev').addEventListener('click', () => { currentIndex = (currentIndex - 1 + allSpreads.length) % allSpreads.length; renderModal(); });
document.getElementById('modalNext').addEventListener('click', () => { currentIndex = (currentIndex + 1) % allSpreads.length; renderModal(); });
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', e => {
  if (!modal.classList.contains('active')) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') { currentIndex = (currentIndex - 1 + allSpreads.length) % allSpreads.length; renderModal(); }
  if (e.key === 'ArrowRight') { currentIndex = (currentIndex + 1) % allSpreads.length; renderModal(); }
});
</script>
