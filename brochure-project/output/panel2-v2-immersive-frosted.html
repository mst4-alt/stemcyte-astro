// ── Gallery rendering
const allSpreads = [
  ...immersive.map(s=>({...s, section:'Immersive Bleed'})),
  ...frosted.map(s=>({...s, section:'Frosted Panel'}))
];

function renderThumb(spread, i, galleryEl) {
  const el = document.createElement('div');
  el.className = 'spread-option';
  el.innerHTML = `
    <div class="spread-thumb">
      <div class="spread" style="width:544px;height:704px;display:flex">${spread.render()}</div>
    </div>
    <div class="spread-label${spread.original?' original':''}">${spread.label}</div>
  `;
  el.addEventListener('click', () => openModal(i));
  galleryEl.appendChild(el);
}

const gA = document.getElementById('galleryA');
const gB = document.getElementById('galleryB');
immersive.forEach((s, i) => renderThumb(s, i, gA));
frosted.forEach((s, i) => renderThumb(s, immersive.length + i, gB));

// ── Modal
let cur = 0;
const modal = document.getElementById('modal');
const modalSpread = document.getElementById('modalSpread');
const modalLabel = document.getElementById('modalLabel');
const modalSection = document.getElementById('modalSection');
const modalCounter = document.getElementById('modalCounter');

function openModal(i) { cur=i; render(); modal.classList.add('active'); document.body.style.overflow='hidden'; }
function closeModal() { modal.classList.remove('active'); document.body.style.overflow=''; }
function render() {
  const s=allSpreads[cur];
  modalSpread.innerHTML=`<div class="spread" style="width:544px;height:704px;display:flex">${s.render()}</div>`;
  modalLabel.textContent=s.label;
  modalSection.textContent=s.section;
  modalCounter.textContent=`${cur+1} of ${allSpreads.length}`;
}
document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('modalPrev').addEventListener('click',()=>{cur=(cur-1+allSpreads.length)%allSpreads.length;render();});
document.getElementById('modalNext').addEventListener('click',()=>{cur=(cur+1)%allSpreads.length;render();});
modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});
document.addEventListener('keydown',e=>{
  if(!modal.classList.contains('active'))return;
  if(e.key==='Escape')closeModal();
  if(e.key==='ArrowLeft'){cur=(cur-1+allSpreads.length)%allSpreads.length;render();}
  if(e.key==='ArrowRight'){cur=(cur+1)%allSpreads.length;render();}
});
</script>
