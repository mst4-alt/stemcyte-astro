<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StemCyte Brochure — Panel 4: Family Stories (20 Options)</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lato:wght@300;400;700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Lato',sans-serif;background:#0a0a0a;color:#fff;-webkit-font-smoothing:antialiased}

:root{
  --plum:#6b1a54;--plum-dark:#3D0F31;--plum-light:#F3F0F8;--plum-10:rgba(107,26,84,0.08);
  --cream:#FAF9F7;--sand:#FAF7F2;--lav:#F3F0F8;--lav-deep:#EDE8F5;
  --sage:#b3508a;--sage-10:rgba(179,80,138,0.07);
  --amber:#d98d9a;--amber-10:rgba(217,141,154,0.07);
  --teal:#2A9D8F;
  --muted:#7A756E;--body:#4A4740;--border:#E8E2DC;
  --blush:#F5E6EE;--warm-white:#FEFCFA;--gold-muted:#C4A97D;
}

/* Gallery */
.gallery-header{text-align:center;padding:48px 24px 32px}
.gallery-header h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:600;color:#fff;margin-bottom:8px}
.gallery-header p{font-size:13px;color:rgba(255,255,255,0.4);max-width:600px;margin:0 auto}

.gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:32px;padding:0 48px 64px;max-width:1200px;margin:0 auto}

.spread-option{cursor:pointer;transition:transform 0.2s}
.spread-option:hover{transform:translateY(-4px)}

.spread-thumb{overflow:hidden;margin:0 auto;border-radius:4px;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.spread-thumb .spread{transform-origin:top left;transform:scale(0.4)}
.spread-thumb{width:218px;height:282px}

.spread-label{text-align:center;margin-top:10px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.4)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;align-items:center;justify-content:center;flex-direction:column}
.modal-overlay.active{display:flex}
.modal-content{position:relative}
.modal-content .spread{box-shadow:0 16px 64px rgba(0,0,0,0.5)}
.modal-label{text-align:center;margin-top:16px;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.5)}
.modal-counter{text-align:center;margin-top:6px;font-size:11px;color:rgba(255,255,255,0.25)}
.modal-nav{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.modal-nav:hover{background:rgba(255,255,255,0.12)}
.modal-prev{left:-80px}
.modal-next{right:-80px}
.modal-close{position:absolute;top:24px;right:24px;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:transparent;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1001}

/* Spread/page base */
.spread{display:flex;width:544px;height:704px;overflow:hidden;border-radius:2px}
.page{width:272px;height:704px;position:relative;overflow:hidden;flex-shrink:0;font-family:'Lato',sans-serif}

/* Shared typography for spread pages */
.page .lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:8px}
.page h2{font-family:'Playfair Display',serif;font-weight:600;line-height:1.2}
.page h3{font-family:'Playfair Display',serif;font-weight:600;line-height:1.2}
.page h4{font-size:9.5px;font-weight:700;letter-spacing:0.2px}
.page p,.page li{font-size:9px;line-height:1.55;color:var(--body)}
.page .stat-num{font-family:'Source Serif 4',serif;font-weight:700;color:var(--plum)}
.page .quote{font-family:'Playfair Display',serif;font-style:italic;line-height:1.45}
.page .pathway-badge{display:inline-block;font-size:7px;font-weight:700;padding:2px 8px;border-radius:100px;letter-spacing:0.5px;text-transform:uppercase}
.page .story-card{border-radius:6px;padding:12px 14px;border:1px solid var(--border)}
.page .story-card h4{margin-bottom:4px}
.page .story-card p{font-size:8.5px;line-height:1.5;color:var(--muted)}
.page .alert-card{border-left:3px solid var(--plum);padding:10px 12px;border-radius:0 6px 6px 0}
.page .divider{height:1px;background:var(--border);margin:12px 0}
.page .hero-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

/* ================================================================
   20 DISTINCT SPREAD DESIGNS
   ================================================================ */

/* ---- OPTION 1: Three Equal Cards ---- */
.opt1L{background:var(--cream);padding:24px 18px;display:flex;flex-direction:column}
.opt1L .sec-lbl{color:var(--plum);margin-bottom:4px}
.opt1L .headline{font-size:18px;color:#2C2A26;margin-bottom:6px}
.opt1L .intro{font-size:9px;color:var(--muted);line-height:1.6;margin-bottom:16px}
.opt1L .story-block{background:#fff;border-radius:8px;padding:14px 14px;margin-bottom:10px;border:1px solid var(--border)}
.opt1L .story-block .pathway{font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.opt1L .story-block .name{font-family:'Playfair Display',serif;font-size:12px;font-weight:600;margin-bottom:2px;color:#2C2A26}
.opt1L .story-block .condition{font-size:7.5px;color:var(--muted);margin-bottom:6px}
.opt1L .story-block .desc{font-size:8.5px;line-height:1.55;color:var(--body)}

.opt1R{background:var(--cream);padding:24px 18px;display:flex;flex-direction:column}
.opt1R .story-block{background:#fff;border-radius:8px;padding:14px 14px;margin-bottom:12px;border:1px solid var(--border)}
.opt1R .story-block .pathway{font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.opt1R .story-block .name{font-family:'Playfair Display',serif;font-size:12px;font-weight:600;margin-bottom:2px;color:#2C2A26}
.opt1R .story-block .condition{font-size:7.5px;color:var(--muted);margin-bottom:6px}
.opt1R .story-block .desc{font-size:8.5px;line-height:1.55;color:var(--body)}
.opt1R .quote-block{margin-top:auto;padding:16px;background:var(--lav);border-radius:8px}
.opt1R .quote-block .qt{font-family:'Playfair Display',serif;font-style:italic;font-size:10px;line-height:1.5;color:var(--plum)}
.opt1R .quote-block .attr{font-size:8px;color:var(--muted);margin-top:6px}

/* ---- OPTION 2: Featured Story + Two Sidebars ---- */
.opt2L{background:var(--sand);padding:24px 18px;display:flex;flex-direction:column}
.opt2L .featured{flex:1;display:flex;flex-direction:column}
.opt2L .featured .pathway{font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--plum);margin-bottom:8px}
.opt2L .featured .name{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:#2C2A26;margin-bottom:4px}
.opt2L .featured .condition{font-size:8px;color:var(--muted);margin-bottom:12px}
.opt2L .featured .story{font-size:10px;line-height:1.65;color:var(--body)}
.opt2L .featured .big-quote{margin-top:auto;font-family:'Playfair Display',serif;font-style:italic;font-size:13px;line-height:1.4;color:var(--plum);padding-top:20px;border-top:1px solid var(--border)}
.opt2L .featured .big-quote .attr{font-family:'Lato',sans-serif;font-style:normal;font-size:8px;color:var(--muted);margin-top:6px;display:block}

.opt2R{background:var(--sand);padding:24px 18px;display:flex;flex-direction:column;gap:12px}
.opt2R .side-story{flex:1;padding:16px;background:rgba(107,26,84,0.04);border-radius:8px;display:flex;flex-direction:column}
.opt2R .side-story .pathway{font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--sage);margin-bottom:6px}
.opt2R .side-story:last-of-type .pathway{color:var(--amber)}
.opt2R .side-story .name{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:#2C2A26;margin-bottom:2px}
.opt2R .side-story .condition{font-size:7.5px;color:var(--muted);margin-bottom:8px}
.opt2R .side-story .desc{font-size:8.5px;line-height:1.55;color:var(--body)}

/* ---- OPTION 3: Vertical Stack + Quote Column ---- */
.opt3L{background:var(--cream);padding:22px 18px;display:flex;flex-direction:column;gap:0}
.opt3L .sec-head{margin-bottom:12px}
.opt3L .sec-head .lbl{color:var(--plum)}
.opt3L .sec-head h2{font-size:16px;color:#2C2A26}
.opt3L .v-story{padding:12px 0;border-bottom:1px solid var(--border)}
.opt3L .v-story:last-of-type{border-bottom:none}
.opt3L .v-story .pathway{font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.opt3L .v-story .name{font-family:'Playfair Display',serif;font-size:11px;font-weight:600;color:#2C2A26;margin-bottom:2px}
.opt3L .v-story .desc{font-size:8.5px;line-height:1.5;color:var(--body)}

.opt3R{background:var(--lav);padding:32px 20px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.opt3R .big-mark{font-family:'Playfair Display',serif;font-size:80px;color:rgba(107,26,84,0.08);line-height:1;margin-bottom:16px}
.opt3R .qt{font-family:'Playfair Display',serif;font-style:italic;font-size:14px;line-height:1.5;color:var(--plum);max-width:200px}
.opt3R .attr{font-size:9px;color:var(--muted);margin-top:12px}
.opt3R .three-paths{margin-top:auto;display:flex;gap:8px;width:100%}
.opt3R .path-pill{flex:1;text-align:center;padding:8px 4px;background:rgba(255,255,255,0.7);border-radius:6px}
.opt3R .path-pill .ic{font-size:14px;margin-bottom:2px}
.opt3R .path-pill .pl{font-size:7px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--plum)}

/* ---- OPTION 4: Color-Coded Left Borders ---- */
.opt4L{background:var(--cream);padding:22px 16px;display:flex;flex-direction:column}
.opt4L .head{margin-bottom:14px}
.opt4L .head .lbl{color:var(--plum)}
.opt4L .head h2{font-size:15px;color:#2C2A26;margin-bottom:4px}
.opt4L .head p{font-size:8.5px;color:var(--muted);line-height:1.5}
.opt4L .alert-story{border-left:3px solid;padding:10px 12px;border-radius:0 6px 6px 0;margin-bottom:10px;background:rgba(255,255,255,0.6)}
.opt4L .alert-story.clr1{border-color:var(--plum);background:rgba(107,26,84,0.03)}
.opt4L .alert-story.clr2{border-color:var(--sage);background:rgba(179,80,138,0.03)}
.opt4L .alert-story .pathway{font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.opt4L .alert-story .name{font-family:'Playfair Display',serif;font-size:11px;font-weight:600;color:#2C2A26;margin-bottom:2px}
.opt4L .alert-story .desc{font-size:8.5px;line-height:1.5;color:var(--body)}

.opt4R{background:var(--cream);padding:22px 16px;display:flex;flex-direction:column}
.opt4R .alert-story{border-left:3px solid var(--amber);padding:10px 12px;border-radius:0 6px 6px 0;margin-bottom:14px;background:rgba(217,141,154,0.03)}
.opt4R .alert-story .pathway{font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;color:var(--amber)}
.opt4R .alert-story .name{font-family:'Playfair Display',serif;font-size:11px;font-weight:600;color:#2C2A26;margin-bottom:2px}
.opt4R .alert-story .desc{font-size:8.5px;line-height:1.5;color:var(--body)}
.opt4R .quote-bottom{margin-top:auto;padding:14px 16px;background:var(--lav);border-radius:8px}
.opt4R .quote-bottom .qt{font-family:'Playfair Display',serif;font-style:italic;font-size:11px;line-height:1.5;color:var(--plum)}
.opt4R .quote-bottom .attr{font-size:8px;color:var(--muted);margin-top:6px}
.opt4R .cta-line{margin-top:12px;text-align:center;font-size:8px;color:var(--muted)}

/* ---- OPTION 5: Timeline/Progression ---- */
.opt5L{background:var(--cream);padding:22px 18px;display:flex;flex-direction:column}
.opt5L .head{margin-bottom:16px}
.opt5L .head .lbl{color:var(--plum)}
.opt5L .head h2{font-size:15px;color:#2C2A26}
.opt5L .tl-entry{position:relative;padding-left:20px;margin-bottom:16px}
.opt5L .tl-entry::before{content:'';position:absolute;left:5px;top:12px;bottom:-16px;width:1.5px;background:var(--border)}
.opt5L .tl-entry:last-child::before{display:none}
.opt5L .tl-dot{position:absolute;left:0;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid var(--cream)}
.opt5L .tl-dot.c1{background:var(--plum);box-shadow:0 0 0 1px var(--plum)}
.opt5L .tl-dot.c2{background:var(--sage);box-shadow:0 0 0 1px var(--sage)}
.opt5L .tl-entry .pathway{font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.opt5L .tl-entry .name{font-family:'Playfair Display',serif;font-size:11.5px;font-weight:600;color:#2C2A26;margin-bottom:2px}
.opt5L .tl-entry .cond{font-size:7.5px;color:var(--muted);margin-bottom:4px}
.opt5L .tl-entry .desc{font-size:8.5px;line-height:1.5;color:var(--body)}

.opt5R{background:var(--cream);padding:22px 18px;display:flex;flex-direction:column}
.opt5R .tl-entry{position:relative;padding-left:20px;margin-bottom:16px}
.opt5R .tl-entry::before{content:'';position:absolute;left:5px;top:12px;bottom:-16px;width:1.5px;background:var(--border)}
.opt5R .tl-entry:last-child::before{display:none}
.opt5R .tl-dot{position:absolute;left:0;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid var(--cream)}
.opt5R .tl-dot.c3{background:var(--amber);box-shadow:0 0 0 1px var(--amber)}
.opt5R .tl-entry .pathway{font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;color:var(--amber)}
.opt5R .tl-entry .name{font-family:'Playfair Display',serif;font-size:11.5px;font-weight:600;color:#2C2A26;margin-bottom:2px}
.opt5R .tl-entry .cond{font-size:7.5px;color:var(--muted);margin-bottom:4px}
.opt5R .tl-entry .desc{font-size:8.5px;line-height:1.5;color:var(--body)}
.opt5R .qt-block{margin-top:auto;padding:14px;border-top:1px solid var(--border)}
.opt5R .qt-block .qt{font-family:'Playfair Display',serif;font-style:italic;font-size:11px;line-height:1.45;color:var(--plum)}
.opt5R .qt-block .attr{font-size:8px;color:var(--muted);margin-top:6px}

/* ---- OPTION 6: Magazine Editorial ---- */
.opt6L{background:var(--warm-white);padding:0;display:flex;flex-direction:column}
.opt6L .img-band{width:100%;height:200px;position:relative;overflow:hidden}
.opt6L .img-band img{width:100%;height:100%;object-fit:cover}
.opt6L .img-band .overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(61,15,49,0.7))}
.opt6L .img-band .over-text{position:absolute;bottom:14px;left:18px;right:18px}
.opt6L .img-band .over-text .lbl{color:rgba(255,255,255,0.5);font-size:7px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:4px}
.opt6L .img-band .over-text h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:#fff;line-height:1.2}
.opt6L .body-area{padding:18px 18px;flex:1;display:flex;flex-direction:column}
.opt6L .pull-quote{font-family:'Playfair Display',serif;font-style:italic;font-size:12px;line-height:1.45;color:var(--plum);padding:12px 0;border-top:2px solid var(--plum);border-bottom:1px solid var(--border);margin-bottom:14px}
.opt6L .pull-quote .attr{font-family:'Lato',sans-serif;font-style:normal;font-size:8px;color:var(--muted);margin-top:6px;display:block}
.opt6L .story-entry{margin-bottom:12px}
.opt6L .story-entry .name-line{display:flex;align-items:baseline;gap:6px;margin-bottom:3px}
.opt6L .story-entry .name-line .name{font-family:'Playfair Display',serif;font-size:11px;font-weight:600;color:#2C2A26}
.opt6L .story-entry .name-line .badge{font-size:6.5px;font-weight:700;padding:2px 6px;border-radius:100px;letter-spacing:0.4px;text-transform:uppercase}
.opt6L .story-entry .desc{font-size:8.5px;line-height:1.55;color:var(--body)}

.opt6R{background:var(--warm-white);padding:22px 18px;display:flex;flex-direction:column}
.opt6R .story-entry{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.opt6R .story-entry:last-of-type{border-bottom:none}
.opt6R .story-entry .name-line{display:flex;align-items:baseline;gap:6px;margin-bottom:3px}
.opt6R .story-entry .name-line .name{font-family:'Playfair Display',serif;font-size:11px;font-weight:600;color:#2C2A26}
.opt6R .story-entry .name-line .badge{font-size:6.5px;font-weight:700;padding:2px 6px;border-radius:100px;letter-spacing:0.4px;text-transform:uppercase}
.opt6R .story-entry .cond{font-size:7.5px;color:var(--muted);margin-bottom:6px}
.opt6R .story-entry .desc{font-size:9px;line-height:1.6;color:var(--body)}
.opt6R .pathways-summary{margin-top:auto;padding:14px;background:var(--lav);border-radius:8px}
.opt6R .pathways-summary h4{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--plum);margin-bottom:8px}
.opt6R .pathways-summary .row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.opt6R .pathways-summary .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.opt6R .pathways-summary .ptxt{font-size:8px;color:var(--body)}

/* ---- OPTION 7: Dark Plum Spread ---- */
.opt7L{background:linear-gradient(160deg,var(--plum),var(--plum-dark));color:#fff;padding:24px 18px;display:flex;flex-direction:column}
.opt7L .lbl{color:rgba(255,255,255,0.25)}
.opt7L h2{font-size:18px;color:#fff;margin-bottom:4px}
.opt7L .sub{font-size:9px;color:rgba(255,255,255,0.45);margin-bottom:20px}
.opt7L .dark-story{padding:14px;background:rgba(255,255,255,0.06);border-radius:8px;margin-bottom:10px}
.opt7L .dark-story .pathway{font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:4px}
.opt7L .dark-story .name{font-family:'Playfair Display',serif;font-size:12px;font-weight:600;color:#fff;margin-bottom:2px}
.opt7L .dark-story .cond{font-size:7.5px;color:rgba(255,255,255,0.35);margin-bottom:6px}
.opt7L .dark-story .desc{font-size:8.5px;line-height:1.55;color:rgba(255,255,255,0.55)}

.opt7R{background:linear-gradient(160deg,var(--plum-dark),#2a0a20);color:#fff;padding:24px 18px;display:flex;flex-direction:column}
.opt7R .dark-story{padding:14px;background:rgba(255,255,255,0.06);border-radius:8px;margin-bottom:12px}
.opt7R .dark-story .pathway{font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:4px}
.opt7R .dark-story .name{font-family:'Playfair Display',serif;font-size:12px;font-weight:600;color:#fff;margin-bottom:2px}
.opt7R .dark-story .cond{font-size:7.5px;color:rgba(255,255,255,0.35);margin-bottom:6px}
.opt7R .dark-story .desc{font-size:8.5px;line-height:1.55;color:rgba(255,255,255,0.55)}
.opt7R .dark-quote{margin-top:auto;padding:14px 16px;background:rgba(255,255,255,0.04);border-radius:8px;border:1px solid rgba(255,255,255,0.08)}
.opt7R .dark-quote .qt{font-family:'Playfair Display',serif;font-style:italic;font-size:11px;line-height:1.5;color:rgba(255,255,255,0.7)}
.opt7R .dark-quote .attr{font-size:8px;color:rgba(255,255,255,0.3);margin-top:6px}

/* ---- OPTION 8: Photo Top + Stories Below ---- */
.opt8L{background:var(--cream);padding:0;display:flex;flex-direction:column}
.opt8L .photo-top{height:240px;position:relative;overflow:hidden}
.opt8L .photo-top img{width:100%;height:100%;object-fit:cover;object-position:center 30%}
.opt8L .photo-top .grad{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,var(--cream))}

// ============================================================
// LOAD IMAGES (use relative paths to source-files)
// ============================================================
const IMG_MAP = {
  'Hero_1': '../source-files/Hero_1_sm.jpg',
  'Hero_2': '../source-files/Hero_2_sm.jpg',
  'Hero_4': '../source-files/Hero_4_sm.jpg',
  'Hero_5': '../source-files/Hero_5_sm.jpg',
  'Hero_6': '../source-files/Hero_6_sm.jpg',
};

function loadImages(container) {
  container.querySelectorAll('[data-img]').forEach(el => {
    const key = el.getAttribute('data-img');
    if (IMG_MAP[key]) el.src = IMG_MAP[key];
  });
}

// ============================================================
// BUILD GALLERY
// ============================================================
const gallery = document.getElementById('gallery');

OPTIONS.forEach((opt, i) => {
  const wrapper = document.createElement('div');
  wrapper.className = 'spread-option';
  wrapper.onclick = () => openModal(i);

  wrapper.innerHTML = `
    <div class="spread-thumb">
      <div class="spread" style="width:544px;height:704px;">
        ${opt.left}
        ${opt.right}
      </div>
    </div>
    <div class="spread-label">${(i + 1)}. ${opt.label}</div>
  `;

  loadImages(wrapper);
  gallery.appendChild(wrapper);
});

// ============================================================
// MODAL
// ============================================================
let currentIdx = 0;
const modal = document.getElementById('modal');
const modalContent = document.getElementById('modalContent');
const modalLabel = document.getElementById('modalLabel');
const modalCounter = document.getElementById('modalCounter');

function openModal(idx) {
  currentIdx = idx;
  renderModal();
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modal.classList.remove('active');
  document.body.style.overflow = '';
}

function navModal(dir) {
  currentIdx = (currentIdx + dir + OPTIONS.length) % OPTIONS.length;
  renderModal();
}

function renderModal() {
  const opt = OPTIONS[currentIdx];
  // Keep nav buttons, replace spread
  const existing = modalContent.querySelector('.spread');
  if (existing) existing.remove();

  const spread = document.createElement('div');
  spread.className = 'spread';
  spread.style.cssText = 'width:544px;height:704px;';
  spread.innerHTML = opt.left + opt.right;
  loadImages(spread);

  // Insert before nav buttons
  modalContent.insertBefore(spread, modalContent.querySelector('.modal-nav'));

  modalLabel.textContent = `${currentIdx + 1}. ${opt.label}`;
  modalCounter.textContent = `${currentIdx + 1} of ${OPTIONS.length}`;
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (!modal.classList.contains('active')) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') navModal(-1);
  if (e.key === 'ArrowRight') navModal(1);
});

// Click backdrop to close
modal.addEventListener('click', e => {
  if (e.target === modal) closeModal();
});
</script>
