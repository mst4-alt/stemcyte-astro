<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StemCyte Brochure — Panel 4: Family Stories (20 Options)</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lato:wght@300;400;700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Lato',sans-serif;background:#0a0a0a;color:#fff;-webkit-font-smoothing:antialiased}

:root{
  --plum:#6b1a54;--plum-dark:#3D0F31;--plum-light:#F3F0F8;--plum-10:rgba(107,26,84,0.08);
  --cream:#FAF9F7;--sand:#FAF7F2;--lav:#F3F0F8;--lav-deep:#EDE8F5;
  --sage:#b3508a;--sage-10:rgba(179,80,138,0.07);
  --amber:#d98d9a;--amber-10:rgba(217,141,154,0.07);
  --teal:#2A9D8F;
  --muted:#7A756E;--body:#4A4740;--border:#E8E2DC;
  --blush:#F5E6EE;--warm-white:#FEFCFA;--gold-muted:#C4A97D;
}

/* Gallery */
.gallery-header{text-align:center;padding:48px 24px 32px}
.gallery-header h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:600;color:#fff;margin-bottom:8px}
.gallery-header p{font-size:13px;color:rgba(255,255,255,0.4);max-width:600px;margin:0 auto}

.gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:32px;padding:0 48px 64px;max-width:1200px;margin:0 auto}

.spread-option{cursor:pointer;transition:transform 0.2s}
.spread-option:hover{transform:translateY(-4px)}

.spread-thumb{overflow:hidden;margin:0 auto;border-radius:4px;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.spread-thumb .spread{transform-origin:top left;transform:scale(0.4)}
.spread-thumb{width:218px;height:282px}

.spread-label{text-align:center;margin-top:10px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.4)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;align-items:center;justify-content:center;flex-direction:column}
.modal-overlay.active{display:flex}
.modal-content{position:relative}
.modal-content .spread{box-shadow:0 16px 64px rgba(0,0,0,0.5)}
.modal-label{text-align:center;margin-top:16px;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.5)}
.modal-counter{text-align:center;margin-top:6px;font-size:11px;color:rgba(255,255,255,0.25)}
.modal-nav{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.modal-nav:hover{background:rgba(255,255,255,0.12)}
.modal-prev{left:-80px}
.modal-next{right:-80px}
.modal-close{position:absolute;top:24px;right:24px;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:transparent;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1001}

/* Spread/page base */
.spread{display:flex;width:544px;height:704px;overflow:hidden;border-radius:2px}
.page{width:272px;height:704px;position:relative;overflow:hidden;flex-shrink:0;font-family:'Lato',sans-serif}

/* Shared photo placeholder */
.photo{background:#D8D0C8;position:relative;overflow:hidden}
.photo img{width:100%;height:100%;object-fit:cover;display:block}
.photo .ph-label{position:absolute;bottom:8px;left:8px;font-size:7px;color:rgba(255,255,255,0.5);font-weight:700;letter-spacing:0.5px;background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:3px}

</style>
</head>

// ============================================================
// BUILD GALLERY
// ============================================================
const gallery = document.getElementById('gallery');
OPTIONS.forEach((opt, i) => {
  const wrapper = document.createElement('div');
  wrapper.className = 'spread-option';
  wrapper.onclick = () => openModal(i);
  wrapper.innerHTML = `
    <div class="spread-thumb">
      <div class="spread" style="width:544px;height:704px;">
        ${opt.left}${opt.right}
      </div>
    </div>
    <div class="spread-label">${i + 1}. ${opt.label}</div>
  `;
  gallery.appendChild(wrapper);
});

// ============================================================
// MODAL
// ============================================================
let currentIdx = 0;
const modal = document.getElementById('modal');
const modalContent = document.getElementById('modalContent');
const modalLabel = document.getElementById('modalLabel');
const modalCounter = document.getElementById('modalCounter');

function openModal(idx) {
  currentIdx = idx;
  renderModal();
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  modal.classList.remove('active');
  document.body.style.overflow = '';
}
function navModal(dir) {
  currentIdx = (currentIdx + dir + OPTIONS.length) % OPTIONS.length;
  renderModal();
}
function renderModal() {
  const opt = OPTIONS[currentIdx];
  const existing = modalContent.querySelector('.spread');
  if (existing) existing.remove();
  const spread = document.createElement('div');
  spread.className = 'spread';
  spread.style.cssText = 'width:544px;height:704px;';
  spread.innerHTML = opt.left + opt.right;
  modalContent.insertBefore(spread, modalContent.querySelector('.modal-nav'));
  modalLabel.textContent = `${currentIdx + 1}. ${opt.label}`;
  modalCounter.textContent = `${currentIdx + 1} of ${OPTIONS.length}`;
}
document.addEventListener('keydown', e => {
  if (!modal.classList.contains('active')) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') navModal(-1);
  if (e.key === 'ArrowRight') navModal(1);
});
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
</script>
