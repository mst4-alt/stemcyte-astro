*{margin:0;padding:0;box-sizing:border-box}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;align-items:center;justify-content:center;flex-direction:column}
.modal-overlay.active{display:flex}
.modal-content{position:relative}
.modal-label{text-align:center;margin-top:16px;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.5)}

.modal-close{position:fixed;top:20px;right:24px;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:transparent;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1001}
.modal-close:hover{background:rgba(255,255,255,0.1)}
.modal-nav{position:fixed;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:transparent;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1001}

.modal-nav.prev{left:20px}
.modal-nav.next{right:20px}

/* Spread */
.spread{width:544px;height:704px;display:flex;flex-shrink:0}
.page{width:272px;height:704px;position:relative;overflow:hidden;flex-shrink:0;font-family:'Lato',sans-serif}
.page *{box-sizing:border-box}

const gallery = document.getElementById('gallery');
OPTIONS.forEach((opt, i) => {
  const el = document.createElement('div');
  el.className = 'spread-option';
  el.onclick = () => openModal(i);
  el.innerHTML = `
    <div class="spread-thumb">
      <div class="spread">
        <div class="page left">${opt.left()}</div>
        <div class="page right">${opt.right()}</div>
      </div>
    </div>
    <div class="spread-label">${opt.label}</div>
  `;
  gallery.appendChild(el);

// === MODAL ===
let currentIdx = 0;
const modal = document.getElementById('modal');
const modalSpread = document.getElementById('modal-spread');
const modalLabel = document.getElementById('modal-label');
const modalCounter = document.getElementById('modal-counter');

function openModal(idx) {
  currentIdx = idx;
  renderModal();
  modal.classList.add('active');
}

function closeModal() {
  modal.classList.remove('active');
}

function navModal(dir) {
  currentIdx = (currentIdx + dir + OPTIONS.length) % OPTIONS.length;
  renderModal();
}

function renderModal() {
  const opt = OPTIONS[currentIdx];
  modalSpread.innerHTML = `
    <div class="spread" style="box-shadow:0 12px 48px rgba(0,0,0,0.4)">
      <div class="page left">${opt.left()}</div>
      <div class="page right">${opt.right()}</div>
    </div>
  `;
  modalLabel.textContent = opt.label;
  modalCounter.textContent = (currentIdx + 1) + ' / ' + OPTIONS.length;
}

document.addEventListener('keydown', e => {
  if (!modal.classList.contains('active')) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') navModal(-1);
  if (e.key === 'ArrowRight') navModal(1);
});

modal.addEventListener('click', e => {
  if (e.target === modal) closeModal();
});
</script>
</body>
</html>
