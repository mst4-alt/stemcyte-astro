<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cell Sphere - StemCyte Animation Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #3D0F31;
    color: #fff;
    font-family: 'Lato', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 40px;
  }

  .back-link {
    position: fixed;
    top: 24px;
    left: 28px;
    z-index: 10;
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.5);
    text-decoration: none;
    letter-spacing: 0.03em;
    pointer-events: all;
    transition: color 0.3s ease;
  }

  .back-link:hover {
    color: rgba(255, 255, 255, 0.85);
  }

  .info {
    max-width: 480px;
  }

  .info h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: clamp(32px, 5vw, 56px);
    line-height: 1.1;
    color: rgba(255, 255, 255, 0.92);
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }

  .info p {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: clamp(14px, 1.6vw, 17px);
    line-height: 1.6;
    color: rgba(255, 255, 255, 0.45);
    max-width: 380px;
  }

  @media (max-width: 600px) {
    .overlay { padding: 24px; }
    .back-link { top: 16px; left: 20px; }
  }
</style>
</head>
<body>

<a href="index.html" class="back-link">&larr; Back to Gallery</a>

<canvas id="sphere-canvas"></canvas>

<div class="overlay">
  <div class="info">
    <h1>Cell Sphere</h1>
    <p>A biological globe of translucent cell-like particles. Move your cursor to explore.</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  'use strict';

  // --- Config ---
  const PARTICLE_COUNT = 1000;
  const SPHERE_RADIUS = 2.8;
  const ROTATION_Y_SPEED = 0.1;
  const ROTATION_X_SPEED = 0.02;
  const MOUSE_INFLUENCE = 0.4;
  const LERP_FACTOR = 0.04;

  // Colors
  const COLORS = [
    new THREE.Color(0x6C1A55), // plum
    new THREE.Color(0x8B2A6E), // lighter plum
    new THREE.Color(0x4FA3B8), // teal
    new THREE.Color(0x6BC4D6), // light teal
    new THREE.Color(0xC4A8D8), // lavender
    new THREE.Color(0xDBC1E8), // light lavender
    new THREE.Color(0xE8B4B8), // blush
    new THREE.Color(0xF0C8CC), // light blush
  ];

  // --- Setup ---
  const canvas = document.getElementById('sphere-canvas');
  const renderer = new THREE.WebGLRenderer({
    canvas: canvas,
    antialias: true,
    alpha: false,
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x3D0F31, 1);
  renderer.sortObjects = false;

  const scene = new THREE.Scene();

  // Fog for depth
  scene.fog = new THREE.FogExp2(0x3D0F31, 0.06);

  const camera = new THREE.PerspectiveCamera(
    50,
    window.innerWidth / window.innerHeight,
    0.1,
    100
  );
  camera.position.z = 7.5;

  // --- Background gradient (screen-space quad) ---
  const bgScene = new THREE.Scene();
  const bgCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
  const bgGeo = new THREE.PlaneBufferGeometry(2, 2);
  const bgMat = new THREE.ShaderMaterial({
    depthWrite: false,
    uniforms: {
      uColor1: { value: new THREE.Color(0x3D0F31) },
      uColor2: { value: new THREE.Color(0x1A0612) },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 uColor1;
      uniform vec3 uColor2;
      varying vec2 vUv;
      void main() {
        float t = length(vUv - 0.5) * 1.4;
        gl_FragColor = vec4(mix(uColor1, uColor2, t), 1.0);
      }
    `,
  });
  bgScene.add(new THREE.Mesh(bgGeo, bgMat));

  // --- Lighting ---
  const ambientLight = new THREE.AmbientLight(0xFFE8D6, 0.3);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xFFD4B8, 0.6);
  dirLight.position.set(4, 5, 3);
  scene.add(dirLight);

  // --- Fibonacci sphere distribution ---
  function fibSphere(count, radius) {
    const positions = [];
    const goldenAngle = Math.PI * (3.0 - Math.sqrt(5.0));
    for (let i = 0; i < count; i++) {
      const y = 1 - (i / (count - 1)) * 2; // -1 to 1
      const radiusAtY = Math.sqrt(1 - y * y);
      const theta = goldenAngle * i;
      const offset = 1.0 + (Math.random() - 0.5) * 0.1; // +/- 5%
      const r = radius * offset;
      positions.push(
        Math.cos(theta) * radiusAtY * r,
        y * r,
        Math.sin(theta) * radiusAtY * r
      );
    }
    return positions;
  }

  // --- Particle system with custom shader ---
  const positions = fibSphere(PARTICLE_COUNT, SPHERE_RADIUS);
  const colors = [];
  const sizes = [];
  const phases = [];

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const col = COLORS[Math.floor(Math.random() * COLORS.length)];
    colors.push(col.r, col.g, col.b);
    sizes.push(0.06 + Math.random() * 0.08);
    phases.push(Math.random() * Math.PI * 2);
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geometry.setAttribute('aColor', new THREE.Float32BufferAttribute(colors, 3));
  geometry.setAttribute('aSize', new THREE.Float32BufferAttribute(sizes, 1));
  geometry.setAttribute('aPhase', new THREE.Float32BufferAttribute(phases, 1));

  const particleMaterial = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: {
      uTime: { value: 0 },
      uPixelRatio: { value: renderer.getPixelRatio() },
      uCameraPos: { value: camera.position },
      uSphereRadius: { value: SPHERE_RADIUS },
    },
    vertexShader: `
      attribute vec3 aColor;
      attribute float aSize;
      attribute float aPhase;
      uniform float uTime;
      uniform float uPixelRatio;
      uniform vec3 uCameraPos;
      uniform float uSphereRadius;
      varying vec3 vColor;
      varying float vAlpha;
      varying float vDist;

      void main() {
        vColor = aColor;

        // Pulse
        float pulse = 0.85 + 0.15 * sin(uTime * 1.5 + aPhase);
        float size = aSize * pulse;

        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        float dist = -mvPosition.z;
        vDist = dist;

        // Depth-based transparency
        float normalizedDist = clamp((dist - 3.0) / 8.0, 0.0, 1.0);
        vAlpha = mix(0.85, 0.15, normalizedDist);

        // Size attenuation
        gl_PointSize = size * uPixelRatio * (300.0 / dist);
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vAlpha;
      varying float vDist;

      void main() {
        // Soft circular falloff
        vec2 center = gl_PointCoord - 0.5;
        float r = length(center);
        if (r > 0.5) discard;

        // Smooth gaussian-like glow
        float glow = exp(-r * r * 8.0);
        // Soft outer ring
        float ring = smoothstep(0.5, 0.15, r);

        float alpha = glow * ring * vAlpha;

        // Brighten center
        vec3 col = vColor + vec3(0.3) * glow * glow;

        gl_FragColor = vec4(col, alpha);
      }
    `,
  });

  const particles = new THREE.Points(geometry, particleMaterial);
  scene.add(particles);

  // --- Atmosphere glow (Fresnel sphere) ---
  const atmosGeo = new THREE.SphereBufferGeometry(SPHERE_RADIUS * 1.15, 64, 64);
  const atmosMat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    side: THREE.BackSide,
    blending: THREE.AdditiveBlending,
    uniforms: {
      uColor: { value: new THREE.Color(0x6C1A55) },
      uColor2: { value: new THREE.Color(0x4FA3B8) },
    },
    vertexShader: `
      varying vec3 vNormal;
      varying vec3 vViewDir;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        vViewDir = normalize(-mvPos.xyz);
        gl_Position = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      uniform vec3 uColor;
      uniform vec3 uColor2;
      varying vec3 vNormal;
      varying vec3 vViewDir;
      void main() {
        float fresnel = 1.0 - dot(vNormal, vViewDir);
        fresnel = pow(fresnel, 3.0);
        vec3 col = mix(uColor, uColor2, fresnel);
        gl_FragColor = vec4(col, fresnel * 0.18);
      }
    `,
  });
  const atmosphere = new THREE.Mesh(atmosGeo, atmosMat);
  scene.add(atmosphere);

  // --- Inner glow core ---
  const coreGeo = new THREE.SphereBufferGeometry(SPHERE_RADIUS * 0.3, 32, 32);
  const coreMat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: {
      uColor: { value: new THREE.Color(0x8B2A6E) },
    },
    vertexShader: `
      varying vec3 vNormal;
      varying vec3 vViewDir;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        vViewDir = normalize(-mvPos.xyz);
        gl_Position = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      uniform vec3 uColor;
      varying vec3 vNormal;
      varying vec3 vViewDir;
      void main() {
        float fresnel = dot(vNormal, vViewDir);
        float glow = pow(fresnel, 2.0);
        gl_FragColor = vec4(uColor, glow * 0.08);
      }
    `,
  });
  const core = new THREE.Mesh(coreGeo, coreMat);
  scene.add(core);

  // --- Mouse tracking ---
  const mouse = { x: 0, y: 0 };
  const smoothMouse = { x: 0, y: 0 };

  function onPointerMove(e) {
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (clientX / window.innerWidth) * 2 - 1;
    mouse.y = (clientY / window.innerHeight) * 2 - 1;
  }

  window.addEventListener('mousemove', onPointerMove, { passive: true });
  window.addEventListener('touchmove', onPointerMove, { passive: true });

  // --- Resize ---
  function onResize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    particleMaterial.uniforms.uPixelRatio.value = renderer.getPixelRatio();
  }
  window.addEventListener('resize', onResize);

  // --- IntersectionObserver: pause when offscreen ---
  let isVisible = true;
  const observer = new IntersectionObserver(
    (entries) => {
      entries.forEach((entry) => {
        isVisible = entry.isIntersecting;
      });
    },
    { threshold: 0.01 }
  );
  observer.observe(canvas);

  // --- Animation loop ---
  let time = 0;
  let lastTimestamp = 0;
  let rafId = null;

  function animate(timestamp) {
    rafId = requestAnimationFrame(animate);

    if (!isVisible) return;

    const delta = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, 0.05) : 0.016;
    lastTimestamp = timestamp;
    time += delta;

    // Smooth mouse
    smoothMouse.x += (mouse.x - smoothMouse.x) * LERP_FACTOR;
    smoothMouse.y += (mouse.y - smoothMouse.y) * LERP_FACTOR;

    // Rotation with mouse tilt
    const baseRotY = time * ROTATION_Y_SPEED;
    const baseRotX = time * ROTATION_X_SPEED;
    const tiltX = smoothMouse.y * MOUSE_INFLUENCE;
    const tiltY = smoothMouse.x * MOUSE_INFLUENCE;

    particles.rotation.y = baseRotY + tiltY;
    particles.rotation.x = baseRotX + tiltX;
    atmosphere.rotation.y = baseRotY + tiltY;
    atmosphere.rotation.x = baseRotX + tiltX;
    core.rotation.y = baseRotY * 0.5 + tiltY;
    core.rotation.x = baseRotX * 0.5 + tiltX;

    // Update uniforms
    particleMaterial.uniforms.uTime.value = time;

    // Render background
    renderer.autoClear = false;
    renderer.clear();
    renderer.render(bgScene, bgCamera);

    // Render scene
    renderer.render(scene, camera);
  }

  rafId = requestAnimationFrame(animate);

  // Cleanup on page hide
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      lastTimestamp = 0;
    }
  });
})();
</script>
</body>
</html>
