<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cell Field — StemCyte Animation System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #FAF7F2;
    font-family: 'Lato', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  .overlay {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    pointer-events: none;
    padding: 32px 40px;
  }

  .back-link {
    pointer-events: auto;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.03em;
    color: #6C1A55;
    text-decoration: none;
    opacity: 0.55;
    transition: opacity 0.3s ease;
  }
  .back-link:hover { opacity: 1; }
  .back-link svg { width: 14px; height: 14px; }

  .title-block {
    position: fixed;
    bottom: 48px;
    left: 40px;
    z-index: 10;
    pointer-events: none;
  }

  .title-block h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-size: clamp(28px, 4vw, 48px);
    color: #3D0F31;
    opacity: 0.13;
    line-height: 1.1;
    letter-spacing: -0.01em;
  }

  .title-block p {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 13px;
    color: #6C1A55;
    opacity: 0.35;
    margin-top: 8px;
    letter-spacing: 0.02em;
  }

  @media (max-width: 600px) {
    .overlay { padding: 20px 24px; }
    .title-block { bottom: 32px; left: 24px; }
  }
</style>
</head>
<body>

<div class="overlay">
  <a href="index.html" class="back-link">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="7" x2="2" y2="7"/>
      <polyline points="6,3 2,7 6,11"/>
    </svg>
    Back to Gallery
  </a>
</div>

<div class="title-block">
  <h1>Cell Field</h1>
  <p>Ambient stem cell simulation</p>
</div>

<canvas id="canvas"></canvas>

<script>
(function () {
  'use strict';

  // --- Configuration ---
  const BG = '#FAF7F2';
  const CELL_COUNT_BASE = 35;
  const CELL_COUNT_MAX = 60;
  const MOUSE_RADIUS = 150;
  const MOUSE_FORCE = 0.8;
  const BROWNIAN_STRENGTH = 0.012;
  const DAMPING = 0.985;
  const COLLISION_STRENGTH = 0.3;
  const MITOSIS_INTERVAL_MIN = 8000;
  const MITOSIS_INTERVAL_MAX = 15000;
  const MITOSIS_DURATION = 2200;
  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  // --- Color palettes for cells ---
  const CELL_PALETTES = [
    { // lavender
      glow: 'rgba(237, 232, 245, 0.35)',
      body: ['rgba(237, 232, 245, 0.7)', 'rgba(218, 206, 235, 0.45)', 'rgba(195, 178, 220, 0.2)'],
      edge: 'rgba(180, 160, 210, 0.15)',
      nucleus: ['rgba(108, 26, 85, 0.6)', 'rgba(108, 26, 85, 0.15)'],
      specular: 'rgba(255, 255, 255, 0.55)',
    },
    { // blush pink
      glow: 'rgba(245, 215, 220, 0.35)',
      body: ['rgba(245, 218, 225, 0.7)', 'rgba(235, 190, 200, 0.45)', 'rgba(220, 170, 185, 0.2)'],
      edge: 'rgba(210, 155, 175, 0.15)',
      nucleus: ['rgba(160, 50, 80, 0.55)', 'rgba(160, 50, 80, 0.12)'],
      specular: 'rgba(255, 255, 255, 0.5)',
    },
    { // soft plum
      glow: 'rgba(200, 170, 195, 0.3)',
      body: ['rgba(200, 170, 195, 0.65)', 'rgba(170, 130, 165, 0.4)', 'rgba(140, 100, 140, 0.18)'],
      edge: 'rgba(130, 85, 130, 0.12)',
      nucleus: ['rgba(61, 15, 49, 0.6)', 'rgba(61, 15, 49, 0.12)'],
      specular: 'rgba(255, 240, 250, 0.5)',
    },
    { // teal
      glow: 'rgba(150, 210, 220, 0.3)',
      body: ['rgba(160, 215, 225, 0.6)', 'rgba(120, 190, 205, 0.38)', 'rgba(79, 163, 184, 0.18)'],
      edge: 'rgba(79, 163, 184, 0.13)',
      nucleus: ['rgba(30, 90, 110, 0.55)', 'rgba(30, 90, 110, 0.12)'],
      specular: 'rgba(220, 255, 255, 0.5)',
    },
    { // warm rose
      glow: 'rgba(240, 200, 200, 0.32)',
      body: ['rgba(240, 205, 205, 0.65)', 'rgba(225, 175, 180, 0.4)', 'rgba(200, 145, 155, 0.18)'],
      edge: 'rgba(185, 130, 140, 0.12)',
      nucleus: ['rgba(140, 40, 60, 0.5)', 'rgba(140, 40, 60, 0.1)'],
      specular: 'rgba(255, 245, 245, 0.5)',
    },
  ];

  // --- Canvas setup ---
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // --- Mouse tracking ---
  let mouse = { x: -9999, y: -9999 };
  function onPointerMove(e) {
    const t = e.touches ? e.touches[0] : e;
    mouse.x = t.clientX;
    mouse.y = t.clientY;
  }
  function onPointerLeave() {
    mouse.x = -9999;
    mouse.y = -9999;
  }
  window.addEventListener('mousemove', onPointerMove);
  window.addEventListener('touchmove', onPointerMove, { passive: true });
  window.addEventListener('mouseleave', onPointerLeave);
  window.addEventListener('touchend', onPointerLeave);

  // --- IntersectionObserver for pause ---
  let isVisible = true;
  const observer = new IntersectionObserver(
    (entries) => { isVisible = entries[0].isIntersecting; },
    { threshold: 0.05 }
  );
  observer.observe(canvas);

  // Also pause on tab hidden
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) isVisible = false;
    else isVisible = true;
  });

  // --- Cell class ---
  class Cell {
    constructor(x, y, radius, palette) {
      this.x = x;
      this.y = y;
      this.vx = (Math.random() - 0.5) * 0.3;
      this.vy = (Math.random() - 0.5) * 0.3;
      this.baseRadius = radius;
      this.radius = radius;
      this.palette = palette || CELL_PALETTES[Math.floor(Math.random() * CELL_PALETTES.length)];
      this.phase = Math.random() * Math.PI * 2;
      this.breathSpeed = 0.3 + Math.random() * 0.4;
      this.age = 0;
      this.born = performance.now();

      // Mitosis state
      this.mitosing = false;
      this.mitosisStart = 0;
      this.mitosisSplit = 0; // 0..1 progress
    }

    update(dt) {
      this.age += dt;
      this.phase += this.breathSpeed * dt * 0.001;

      // Gentle breathing
      const breath = 1 + Math.sin(this.phase) * 0.04;
      this.radius = this.baseRadius * breath;

      // Brownian motion
      this.vx += (Math.random() - 0.5) * BROWNIAN_STRENGTH;
      this.vy += (Math.random() - 0.5) * BROWNIAN_STRENGTH;

      // Mouse repulsion
      const dx = this.x - mouse.x;
      const dy = this.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < MOUSE_RADIUS && dist > 0) {
        const force = (1 - dist / MOUSE_RADIUS) * MOUSE_FORCE;
        this.vx += (dx / dist) * force;
        this.vy += (dy / dist) * force;
      }

      // Damping
      this.vx *= DAMPING;
      this.vy *= DAMPING;

      // Move
      this.x += this.vx;
      this.y += this.vy;

      // Soft boundary bounce
      const margin = this.radius * 1.5;
      if (this.x < -margin) this.x = W + margin;
      else if (this.x > W + margin) this.x = -margin;
      if (this.y < -margin) this.y = H + margin;
      else if (this.y > H + margin) this.y = -margin;

      // Mitosis progress
      if (this.mitosing) {
        const elapsed = performance.now() - this.mitosisStart;
        this.mitosisSplit = Math.min(elapsed / MITOSIS_DURATION, 1);
      }
    }

    draw(ctx) {
      const r = this.radius;
      if (r < 1) return;

      ctx.save();
      ctx.translate(this.x, this.y);

      if (this.mitosing && this.mitosisSplit > 0) {
        this._drawMitosis(ctx, r);
      } else {
        this._drawSingleCell(ctx, 0, 0, r, 1);
      }

      ctx.restore();
    }

    _drawMitosis(ctx, r) {
      const t = this.mitosisSplit;
      // Eased progress
      const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

      // Elongation phase (0..0.4), pinch phase (0.4..0.7), separation (0.7..1)
      if (t < 0.7) {
        // Draw as single elongated/pinched cell
        const elongation = Math.min(t / 0.4, 1);
        const pinch = t > 0.4 ? (t - 0.4) / 0.3 : 0;

        ctx.save();
        const scaleX = 1 + elongation * 0.6;
        const scaleY = 1 - pinch * 0.25;
        ctx.scale(scaleX, scaleY);

        // Draw pinch overlay
        this._drawSingleCell(ctx, 0, 0, r, 1);

        // Pinch effect — darker band in middle
        if (pinch > 0) {
          const pinchAlpha = pinch * 0.3;
          const grad = ctx.createLinearGradient(-r * 0.3, 0, r * 0.3, 0);
          grad.addColorStop(0, 'rgba(61,15,49,0)');
          grad.addColorStop(0.4, `rgba(61,15,49,${pinchAlpha})`);
          grad.addColorStop(0.5, `rgba(61,15,49,${pinchAlpha * 1.3})`);
          grad.addColorStop(0.6, `rgba(61,15,49,${pinchAlpha})`);
          grad.addColorStop(1, 'rgba(61,15,49,0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(0, 0, r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      } else {
        // Separation phase: two cells drifting apart
        const sepProgress = (t - 0.7) / 0.3;
        const sepEase = 1 - Math.pow(1 - sepProgress, 3);
        const offset = r * 1.2 * sepEase;
        const childR = r * (0.7 + sepProgress * 0.15);
        const alpha = 0.6 + sepProgress * 0.4;

        this._drawSingleCell(ctx, -offset, 0, childR, alpha);
        this._drawSingleCell(ctx, offset, 0, childR, alpha);
      }
    }

    _drawSingleCell(ctx, cx, cy, r, alpha) {
      const p = this.palette;

      // Outer glow
      const glowR = r * 2.2;
      const glow = ctx.createRadialGradient(cx, cy, r * 0.3, cx, cy, glowR);
      glow.addColorStop(0, this._withAlpha(p.glow, 0.25 * alpha));
      glow.addColorStop(0.5, this._withAlpha(p.glow, 0.1 * alpha));
      glow.addColorStop(1, 'rgba(250,247,242,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
      ctx.fill();

      // Body gradient — off-center highlight
      const hlX = cx - r * 0.25;
      const hlY = cy - r * 0.25;
      const body = ctx.createRadialGradient(hlX, hlY, r * 0.1, cx, cy, r);
      body.addColorStop(0, this._withAlpha(p.body[0], alpha));
      body.addColorStop(0.45, this._withAlpha(p.body[1], alpha));
      body.addColorStop(0.85, this._withAlpha(p.body[2], alpha));
      body.addColorStop(1, 'rgba(250,247,242,0)');
      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();

      // Edge stroke
      ctx.strokeStyle = this._withAlpha(p.edge, alpha);
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.95, 0, Math.PI * 2);
      ctx.stroke();

      // Nucleus
      const nucleusR = r * 0.22;
      const nuc = ctx.createRadialGradient(cx, cy, 0, cx, cy, nucleusR);
      nuc.addColorStop(0, this._withAlpha(p.nucleus[0], alpha));
      nuc.addColorStop(0.6, this._withAlpha(p.nucleus[0], alpha * 0.6));
      nuc.addColorStop(1, this._withAlpha(p.nucleus[1], alpha));
      ctx.fillStyle = nuc;
      ctx.beginPath();
      ctx.arc(cx, cy, nucleusR, 0, Math.PI * 2);
      ctx.fill();

      // Specular highlight (larger cells only)
      if (r > 18) {
        const specX = cx - r * 0.3;
        const specY = cy - r * 0.35;
        const specR = r * 0.18;
        const spec = ctx.createRadialGradient(specX, specY, 0, specX, specY, specR);
        spec.addColorStop(0, this._withAlpha(p.specular, 0.7 * alpha));
        spec.addColorStop(0.5, this._withAlpha(p.specular, 0.2 * alpha));
        spec.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = spec;
        ctx.beginPath();
        ctx.arc(specX, specY, specR, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    _withAlpha(rgba, multiplier) {
      // Adjust alpha of an rgba string
      const match = rgba.match(/rgba?\((\d+),\s*(\d+),\s*(\d+),?\s*([\d.]*)\)/);
      if (!match) return rgba;
      const a = (parseFloat(match[4]) || 1) * multiplier;
      return `rgba(${match[1]},${match[2]},${match[3]},${Math.min(a, 1).toFixed(3)})`;
    }
  }

  // --- Cell management ---
  let cells = [];

  function spawnInitialCells() {
    const count = Math.min(CELL_COUNT_BASE, Math.floor((W * H) / 25000));
    for (let i = 0; i < count; i++) {
      const r = 16 + Math.random() * 28;
      cells.push(new Cell(
        Math.random() * W,
        Math.random() * H,
        r
      ));
    }
  }
  spawnInitialCells();

  // --- Collision resolution ---
  function resolveCollisions() {
    for (let i = 0; i < cells.length; i++) {
      for (let j = i + 1; j < cells.length; j++) {
        const a = cells[i], b = cells[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = (a.radius + b.radius) * 0.85;
        if (dist < minDist && dist > 0) {
          const overlap = (minDist - dist) * COLLISION_STRENGTH;
          const nx = dx / dist;
          const ny = dy / dist;
          a.vx -= nx * overlap * 0.5;
          a.vy -= ny * overlap * 0.5;
          b.vx += nx * overlap * 0.5;
          b.vy += ny * overlap * 0.5;
        }
      }
    }
  }

  // --- Mitosis scheduling ---
  let nextMitosisTime = performance.now() + MITOSIS_INTERVAL_MIN + Math.random() * (MITOSIS_INTERVAL_MAX - MITOSIS_INTERVAL_MIN);

  function checkMitosis(now) {
    if (now < nextMitosisTime) return;

    // Schedule next
    nextMitosisTime = now + MITOSIS_INTERVAL_MIN + Math.random() * (MITOSIS_INTERVAL_MAX - MITOSIS_INTERVAL_MIN);

    // Find eligible cell (not already mitosing, not too small)
    const eligible = cells.filter(c => !c.mitosing && c.baseRadius > 18);
    if (eligible.length === 0) return;

    const cell = eligible[Math.floor(Math.random() * eligible.length)];
    cell.mitosing = true;
    cell.mitosisStart = now;
  }

  function completeMitosis() {
    for (let i = cells.length - 1; i >= 0; i--) {
      const c = cells[i];
      if (c.mitosing && c.mitosisSplit >= 1) {
        // Spawn two daughter cells
        const childR = c.baseRadius * 0.75;
        const offsetX = c.radius * 1.2;

        const d1 = new Cell(c.x - offsetX, c.y, childR, c.palette);
        d1.vx = c.vx - 0.5;
        d1.vy = c.vy + (Math.random() - 0.5) * 0.3;

        const d2 = new Cell(c.x + offsetX, c.y, childR, c.palette);
        d2.vx = c.vx + 0.5;
        d2.vy = c.vy + (Math.random() - 0.5) * 0.3;

        // Remove parent, add daughters
        cells.splice(i, 1);
        cells.push(d1, d2);

        // Cap cell count — remove oldest (smallest) cells
        while (cells.length > CELL_COUNT_MAX) {
          let oldestIdx = 0;
          let oldestTime = cells[0].born;
          for (let j = 1; j < cells.length; j++) {
            if (cells[j].born < oldestTime) {
              oldestTime = cells[j].born;
              oldestIdx = j;
            }
          }
          cells.splice(oldestIdx, 1);
        }
      }
    }
  }

  // --- Render loop ---
  let lastTime = performance.now();

  function frame(now) {
    requestAnimationFrame(frame);

    if (!isVisible) {
      lastTime = now;
      return;
    }

    const dt = Math.min(now - lastTime, 50); // cap dt to avoid jumps
    lastTime = now;

    // Clear
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);

    // Mitosis
    checkMitosis(now);

    // Update
    for (const cell of cells) {
      cell.update(dt);
    }

    resolveCollisions();
    completeMitosis();

    // Sort by radius for depth (smaller = farther back)
    cells.sort((a, b) => a.radius - b.radius);

    // Draw
    for (const cell of cells) {
      cell.draw(ctx);
    }
  }

  requestAnimationFrame(frame);

  // --- Handle resize: re-evaluate cell count ---
  window.addEventListener('resize', () => {
    // If we're way under the ideal count after resize, add a few
    const ideal = Math.min(CELL_COUNT_BASE, Math.floor((W * H) / 25000));
    if (cells.length < ideal * 0.6) {
      const toAdd = Math.floor(ideal * 0.3);
      for (let i = 0; i < toAdd; i++) {
        const r = 16 + Math.random() * 28;
        cells.push(new Cell(Math.random() * W, Math.random() * H, r));
      }
    }
  });

})();
</script>
</body>
</html>
