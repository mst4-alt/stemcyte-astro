<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSAP — Variant B: Canvas Orchestration</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0c1a20; overflow: hidden; font-family: 'Lato', sans-serif; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .back-link {
    position: fixed; top: 20px; left: 24px; z-index: 10;
    color: #4FA3B8; font-size: 13px; text-decoration: none;
    font-family: 'Lato', sans-serif; letter-spacing: 0.3px;
  }
  .back-link:hover { text-decoration: underline; }
  .label {
    position: fixed; bottom: 18px; left: 24px; z-index: 10;
    color: rgba(255,255,255,0.45); font-size: 12px;
    font-family: 'Lato', sans-serif; letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<a class="back-link" href="index.html">&larr; Back to Gallery</a>
<div class="label">GSAP &mdash; Variant B: Canvas Orchestration</div>
<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>
<script>
gsap.registerPlugin(MotionPathPlugin);

// --- Canvas setup ---
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const DPR = Math.min(window.devicePixelRatio || 1, 2);
let W, H;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// --- Palette ---
const palette = [
  {r:79,g:163,b:184},{r:42,g:130,b:155},{r:42,g:99,b:124},{r:60,g:140,b:165},
  {r:90,g:170,b:190},{r:70,g:150,b:175},{r:100,g:180,b:200},{r:55,g:125,b:150}
];

// --- Helpers ---
function rand(min, max) { return min + Math.random() * (max - min); }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function pick(arr) { return arr[randInt(0, arr.length - 1)]; }

// --- drawCell ---
function drawCell(ctx, x, y, r, col, opacity, blur) {
  const bm = blur || 1;
  const glowR = r * (1.2 + bm * 0.4);
  // Outer glow
  const og = ctx.createRadialGradient(x, y, r*0.3, x, y, glowR);
  og.addColorStop(0, `rgba(${col.r},${col.g},${col.b},${opacity*0.4*bm})`);
  og.addColorStop(0.5, `rgba(${col.r},${col.g},${col.b},${opacity*0.15*bm})`);
  og.addColorStop(1, `rgba(${col.r},${col.g},${col.b},0)`);
  ctx.fillStyle = og; ctx.beginPath(); ctx.arc(x, y, glowR, 0, Math.PI*2); ctx.fill();
  // Body gradient
  const bg = ctx.createRadialGradient(x - r*0.12, y - r*0.12, 0, x, y, r);
  bg.addColorStop(0, `rgba(${Math.min(255,col.r+25)},${Math.min(255,col.g+25)},${Math.min(255,col.b+25)},${opacity*0.6})`);
  bg.addColorStop(0.45, `rgba(${col.r},${col.g},${col.b},${opacity*0.35})`);
  bg.addColorStop(0.8, `rgba(${col.r},${col.g},${col.b},${opacity*0.45})`);
  bg.addColorStop(1, `rgba(${Math.max(0,col.r-25)},${Math.max(0,col.g-25)},${Math.max(0,col.b-25)},${opacity*0.12})`);
  ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  if (bm >= 1.5) return;
  // Edge stroke
  ctx.strokeStyle = `rgba(${Math.min(255,col.r+40)},${Math.min(255,col.g+40)},${Math.min(255,col.b+40)},${opacity*0.18/bm})`;
  ctx.lineWidth = r > 30 ? 1.2 : 0.7;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();
  // Nucleus
  const nr = r * 0.22;
  const ng = ctx.createRadialGradient(x, y, 0, x, y, nr);
  ng.addColorStop(0, `rgba(255,255,255,${opacity*0.45})`);
  ng.addColorStop(0.5, `rgba(${Math.min(255,col.r+50)},${Math.min(255,col.g+50)},${Math.min(255,col.b+50)},${opacity*0.2})`);
  ng.addColorStop(1, `rgba(${col.r},${col.g},${col.b},0)`);
  ctx.fillStyle = ng; ctx.beginPath(); ctx.arc(x, y, nr, 0, Math.PI*2); ctx.fill();
  // Specular highlight
  if (r > 18) {
    const hx = x - r*0.26, hy = y - r*0.26;
    const hg = ctx.createRadialGradient(hx, hy, 0, hx, hy, r*0.16);
    hg.addColorStop(0, `rgba(255,255,255,${opacity*0.22})`);
    hg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hg; ctx.beginPath(); ctx.arc(hx, hy, r*0.16, 0, Math.PI*2); ctx.fill();
  }
}

// --- Create cells ---
function makeCell(rMin, rMax, opacity, blur) {
  const sx = rand(0, W);
  const sy = rand(0, H);
  return {
    x: sx, y: sy,
    startX: sx, startY: sy,
    r: rand(rMin, rMax),
    scale: 1,
    color: pick(palette),
    opacity: opacity,
    blur: blur
  };
}

const layers = { back: [], mid: [], front: [] };

function initCells() {
  layers.back = [];
  layers.mid = [];
  layers.front = [];
  for (let i = 0; i < 4; i++) layers.back.push(makeCell(70, 130, 0.035, 2));
  for (let i = 0; i < 10; i++) layers.mid.push(makeCell(15, 45, 0.1, 1));
  for (let i = 0; i < 6; i++) layers.front.push(makeCell(3, 6, 0.25, 0.7));
}
initCells();

// --- GSAP animation ---
const allTimelines = [];

function animateCells() {
  // Kill existing timelines on reinit
  allTimelines.forEach(tl => tl.kill());
  allTimelines.length = 0;

  const allCells = [...layers.back, ...layers.mid, ...layers.front];

  allCells.forEach((cell, i) => {
    const sx = cell.startX;
    const sy = cell.startY;
    const spread = cell.blur >= 2 ? 300 : cell.blur >= 1 ? 200 : 100;

    // Motion path for drifting
    const pathPoints = [];
    for (let p = 0; p < 4; p++) {
      pathPoints.push({
        x: sx + rand(-spread, spread),
        y: sy + rand(-spread, spread)
      });
    }

    const dur = rand(25, 50);
    const tl = gsap.to(cell, {
      motionPath: {
        path: pathPoints,
        curviness: 1.5,
        autoRotate: false
      },
      duration: dur,
      ease: "none",
      repeat: -1,
      delay: rand(0, 8) // stagger start
    });
    allTimelines.push(tl);

    // Breathing / scale pulse
    const breathTl = gsap.to(cell, {
      scale: 1 + rand(0.02, 0.06),
      duration: rand(6, 14),
      ease: "sine.inOut",
      repeat: -1,
      yoyo: true,
      delay: rand(0, 4)
    });
    allTimelines.push(breathTl);
  });
}
animateCells();

// --- Mouse interaction ---
let mouseX = -9999, mouseY = -9999;
const MOUSE_RADIUS = 150;

document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});
document.addEventListener('mouseleave', () => {
  mouseX = -9999;
  mouseY = -9999;
});

// QuickTo targets for smooth dodging per cell
const allCells = [...layers.back, ...layers.mid, ...layers.front];
const nudges = allCells.map(() => ({ nx: 0, ny: 0 }));
const quickXs = nudges.map((n) => gsap.quickTo(n, "nx", { duration: 0.6, ease: "power2.out" }));
const quickYs = nudges.map((n) => gsap.quickTo(n, "ny", { duration: 0.6, ease: "power2.out" }));

function updateMouseDodge() {
  allCells.forEach((cell, i) => {
    const dx = cell.x - mouseX;
    const dy = cell.y - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < MOUSE_RADIUS && dist > 0) {
      const force = (1 - dist / MOUSE_RADIUS) * 60;
      const angle = Math.atan2(dy, dx);
      quickXs[i](Math.cos(angle) * force);
      quickYs[i](Math.sin(angle) * force);
    } else {
      quickXs[i](0);
      quickYs[i](0);
    }
  });
}

// --- Render loop ---
let paused = false;

document.addEventListener('visibilitychange', () => {
  paused = document.hidden;
  if (paused) {
    gsap.globalTimeline.pause();
  } else {
    gsap.globalTimeline.resume();
  }
});

function drawAmbientGlow() {
  const gx = W * 0.5, gy = H * 0.5;
  const gr = Math.max(W, H) * 0.5;
  const ag = ctx.createRadialGradient(gx, gy, 0, gx, gy, gr);
  ag.addColorStop(0, 'rgba(42,130,155,0.04)');
  ag.addColorStop(0.5, 'rgba(42,99,124,0.015)');
  ag.addColorStop(1, 'rgba(12,26,32,0)');
  ctx.fillStyle = ag;
  ctx.fillRect(0, 0, W, H);
}

function render() {
  if (!paused) {
    updateMouseDodge();

    ctx.clearRect(0, 0, W, H);
    drawAmbientGlow();

    // Draw layers back-to-front
    const layerOrder = [layers.back, layers.mid, layers.front];
    let cellIdx = 0;
    layerOrder.forEach(layer => {
      layer.forEach(cell => {
        const n = nudges[cellIdx];
        drawCell(
          ctx,
          cell.x + n.nx,
          cell.y + n.ny,
          cell.r * cell.scale,
          cell.color,
          cell.opacity,
          cell.blur
        );
        cellIdx++;
      });
    });
  }
  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
