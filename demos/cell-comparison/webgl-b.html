<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebGL — Variant B: Volumetric Raymarched Cells</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0c1a20; font-family: 'Lato', sans-serif; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed; bottom: 16px; left: 20px;
    color: #fff; font-size: 12px; font-family: 'Lato', sans-serif;
    opacity: 0.7; pointer-events: none; z-index: 10;
  }
  .back {
    position: fixed; top: 16px; left: 20px;
    color: #4FA3B8; font-size: 13px; font-family: 'Lato', sans-serif;
    text-decoration: none; z-index: 10;
  }
  .back:hover { text-decoration: underline; }
</style>
</head>
<body>
<a class="back" href="index.html">← Back to Gallery</a>
<canvas id="c"></canvas>
<div class="label">WebGL — Variant B: Volumetric Raymarched Cells</div>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl');
if (!gl) { document.body.innerHTML = '<p style="color:#fff;padding:40px">WebGL not supported</p>'; }

const DPR = Math.min(window.devicePixelRatio || 1, 2);
let W, H;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

// --- Mouse ---
let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', e => {
  mouseX = (e.clientX / W) * 2 - 1;
  mouseY = (e.clientY / H) * 2 - 1;
});

// --- Cell data (12 cells) ---
const NUM_CELLS = 12;
const cellBase = [];
for (let i = 0; i < NUM_CELLS; i++) {
  cellBase.push({
    x: (Math.random() - 0.5) * 5.0,
    y: (Math.random() - 0.5) * 3.5,
    z: -2.0 - Math.random() * 6.0,
    r: 0.35 + Math.random() * 0.55,
    phase: Math.random() * Math.PI * 2,
    driftX: (Math.random() - 0.5) * 0.15,
    driftY: (Math.random() - 0.5) * 0.1,
    breathRate: 0.4 + Math.random() * 0.6,
    breathAmp: 0.03 + Math.random() * 0.04,
  });
}

// --- Shaders ---
const vsSource = `
attribute vec2 aPos;
void main() {
  gl_Position = vec4(aPos, 0.0, 1.0);
}`;

const fsSource = `
precision mediump float;

uniform vec2 uRes;
uniform float uTime;
uniform vec2 uMouse;
uniform vec4 uCells[${NUM_CELLS}]; // xyz = pos, w = radius

const int NUM = ${NUM_CELLS};
const int MAX_STEPS = 80;
const float MAX_DIST = 20.0;
const float SURF_DIST = 0.005;

// Smooth minimum for organic merging
float smin(float a, float b, float k) {
  float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
  return mix(b, a, h) - k * h * (1.0 - h);
}

// Scene SDF — returns distance to nearest cell surface
float sceneSDF(vec3 p) {
  float d = MAX_DIST;
  for (int i = 0; i < NUM; i++) {
    float sd = length(p - uCells[i].xyz) - uCells[i].w;
    d = smin(d, sd, 0.3);
  }
  return d;
}

// Compute normal via gradient
vec3 calcNormal(vec3 p) {
  vec2 e = vec2(0.002, 0.0);
  return normalize(vec3(
    sceneSDF(p + e.xyy) - sceneSDF(p - e.xyy),
    sceneSDF(p + e.yxy) - sceneSDF(p - e.yxy),
    sceneSDF(p + e.yyx) - sceneSDF(p - e.yyx)
  ));
}

// Nucleus SDF — inner bright spot per cell
float nucleusSDF(vec3 p) {
  float d = MAX_DIST;
  for (int i = 0; i < NUM; i++) {
    float nr = uCells[i].w * 0.3;
    float sd = length(p - uCells[i].xyz) - nr;
    d = min(d, sd);
  }
  return d;
}

void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5 * uRes) / uRes.y;

  // Camera with subtle mouse tilt
  vec3 ro = vec3(0.0, 0.0, 3.0);
  vec3 rd = normalize(vec3(uv + uMouse * 0.08, -1.2));

  // Slight rotation from mouse
  float ax = uMouse.y * 0.06;
  float ay = uMouse.x * 0.08;
  mat3 rotY = mat3(cos(ay), 0, sin(ay), 0, 1, 0, -sin(ay), 0, cos(ay));
  mat3 rotX = mat3(1, 0, 0, 0, cos(ax), -sin(ax), 0, sin(ax), cos(ax));
  rd = rotY * rotX * rd;

  vec3 bg = vec3(0.047, 0.102, 0.125); // #0c1a20
  vec3 col = bg;

  // Light
  vec3 lightDir = normalize(vec3(0.5, 0.8, 0.6));

  // Volumetric accumulation
  float t = 0.0;
  vec3 accum = vec3(0.0);
  float alpha = 0.0;
  float transmittance = 1.0;

  for (int i = 0; i < MAX_STEPS; i++) {
    if (t > MAX_DIST || transmittance < 0.01) break;
    vec3 p = ro + rd * t;
    float d = sceneSDF(p);

    if (d < SURF_DIST * 2.0) {
      // We are near/inside a cell — accumulate volumetric color
      vec3 n = calcNormal(p);
      float ndl = max(dot(n, lightDir), 0.0);

      // Depth-based attenuation
      float depth = -p.z;
      float depthFade = smoothstep(8.0, 2.0, depth);

      // Fresnel / rim / subsurface scatter
      float fresnel = pow(1.0 - max(dot(n, -rd), 0.0), 2.5);

      // Teal palette
      vec3 cellDeep = vec3(0.165, 0.39, 0.49);
      vec3 cellMid = vec3(0.165, 0.51, 0.61);
      vec3 cellBright = vec3(0.31, 0.64, 0.72);

      vec3 cellColor = mix(cellDeep, cellMid, ndl);
      cellColor = mix(cellColor, cellBright, fresnel * 0.7);

      // Subsurface scattering — warmer at edges
      vec3 sss = vec3(0.4, 0.75, 0.8) * fresnel * 0.5;
      cellColor += sss;

      // Specular (Phong)
      vec3 refl = reflect(-lightDir, n);
      float spec = pow(max(dot(refl, -rd), 0.0), 32.0);
      cellColor += vec3(0.6, 0.85, 0.9) * spec * 0.4;

      // Nucleus glow
      float nDist = nucleusSDF(p);
      if (nDist < 0.05) {
        float nucleusGlow = smoothstep(0.05, -0.05, nDist);
        cellColor = mix(cellColor, vec3(0.85, 0.97, 1.0), nucleusGlow * 0.9);
      } else if (nDist < 0.3) {
        float softGlow = smoothstep(0.3, 0.0, nDist);
        cellColor += vec3(0.2, 0.5, 0.55) * softGlow * 0.3;
      }

      // Accumulate with depth fade and transmittance
      float stepAlpha = (0.12 + fresnel * 0.15) * depthFade;
      accum += cellColor * stepAlpha * transmittance;
      transmittance *= (1.0 - stepAlpha);

      // Step small inside volumes
      t += max(0.02, abs(d) * 0.5);
    } else {
      // Step normally
      t += d * 0.8;
    }
  }

  // Depth fog
  col = bg * transmittance + accum;

  // Subtle vignette
  vec2 vuv = gl_FragCoord.xy / uRes;
  float vig = 1.0 - 0.3 * length((vuv - 0.5) * 1.4);
  col *= vig;

  // Tone mapping
  col = col / (col + 0.8) * 1.15;

  gl_FragColor = vec4(col, 1.0);
}`;

// --- Compile shaders ---
function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const vs = compile(gl.VERTEX_SHADER, vsSource);
const fs = compile(gl.FRAGMENT_SHADER, fsSource);
const prog = gl.createProgram();
gl.attachShader(prog, vs);
gl.attachShader(prog, fs);
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error(gl.getProgramInfoLog(prog));
}
gl.useProgram(prog);

// --- Fullscreen quad ---
const quad = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// --- Uniforms ---
const uRes = gl.getUniformLocation(prog, 'uRes');
const uTime = gl.getUniformLocation(prog, 'uTime');
const uMouse = gl.getUniformLocation(prog, 'uMouse');
const uCells = [];
for (let i = 0; i < NUM_CELLS; i++) {
  uCells.push(gl.getUniformLocation(prog, `uCells[${i}]`));
}

// --- Visibility ---
let paused = false;
document.addEventListener('visibilitychange', () => {
  paused = document.hidden;
});

// --- Render loop ---
let startTime = performance.now();

function frame(now) {
  requestAnimationFrame(frame);
  if (paused) return;

  const t = (now - startTime) * 0.001;

  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, t);
  gl.uniform2f(uMouse, mouseX, mouseY);

  // Update cell positions/sizes
  for (let i = 0; i < NUM_CELLS; i++) {
    const c = cellBase[i];
    const x = c.x + Math.sin(t * c.driftX * 2 + c.phase) * 0.6;
    const y = c.y + Math.cos(t * c.driftY * 2 + c.phase * 1.3) * 0.4;
    const z = c.z;
    const r = c.r + Math.sin(t * c.breathRate + c.phase) * c.breathAmp;
    gl.uniform4f(uCells[i], x, y, z, r);
  }

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
