<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixi.js — Variant A: Sprite-Based Cells</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0c1a20; font-family: 'Lato', sans-serif; }
  canvas { display: block; }
  .overlay { position: fixed; z-index: 10; pointer-events: none; }
  .back-link {
    position: fixed; top: 20px; left: 20px; z-index: 10;
    color: #4FA3B8; text-decoration: none; font-size: 13px;
    font-family: 'Lato', sans-serif; pointer-events: auto;
    transition: opacity 0.2s;
  }
  .back-link:hover { opacity: 0.7; }
  .label {
    position: fixed; bottom: 16px; left: 20px; z-index: 10;
    color: #fff; font-size: 12px; font-family: 'Lato', sans-serif;
    opacity: 0.55;
  }
</style>
</head>
<body>

<a class="back-link" href="index.html">&larr; Back to Gallery</a>
<div class="label">Pixi.js &mdash; Variant A: Sprite-Based Cells</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.x/dist/pixi.min.js"></script>
<script>
(function () {
  'use strict';

  /* ---------- constants ---------- */
  const PALETTE = [
    { r: 79, g: 163, b: 184 },
    { r: 42, g: 130, b: 155 },
    { r: 42, g: 99,  b: 124 },
    { r: 60, g: 140, b: 165 },
    { r: 90, g: 170, b: 190 },
    { r: 70, g: 150, b: 175 },
  ];

  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  /* ---------- Pixi app ---------- */
  const app = new PIXI.Application({
    resizeTo: window,
    backgroundColor: 0x0c1a20,
    resolution: DPR,
    autoDensity: true,
    antialias: true,
  });
  document.body.appendChild(app.view);

  /* ---------- mouse ---------- */
  const mouse = { x: -9999, y: -9999 };
  app.view.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });
  app.view.addEventListener('mouseleave', () => {
    mouse.x = -9999;
    mouse.y = -9999;
  });

  /* ---------- pause when hidden ---------- */
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) app.ticker.stop();
    else app.ticker.start();
  });

  /* ---------- draw cell texture ---------- */
  function drawCell(radius, color) {
    const pad = radius * 1.8;
    const size = Math.ceil((radius + pad) * 2);
    const cx = size / 2;
    const cy = size / 2;
    const r = radius;

    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    const cr = color.r, cg = color.g, cb = color.b;

    // Outer glow
    const glowR = r * 1.6;
    const glow = ctx.createRadialGradient(cx, cy, r * 0.3, cx, cy, glowR);
    glow.addColorStop(0, `rgba(${cr},${cg},${cb},0.25)`);
    glow.addColorStop(0.5, `rgba(${cr},${cg},${cb},0.08)`);
    glow.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Body
    const bodyGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    bodyGrad.addColorStop(0, `rgba(${Math.min(cr + 60, 255)},${Math.min(cg + 60, 255)},${Math.min(cb + 60, 255)},0.7)`);
    bodyGrad.addColorStop(0.5, `rgba(${cr},${cg},${cb},0.4)`);
    bodyGrad.addColorStop(0.85, `rgba(${cr},${cg},${cb},0.15)`);
    bodyGrad.addColorStop(1, `rgba(${cr},${cg},${cb},0.05)`);
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();

    // Edge stroke
    ctx.strokeStyle = `rgba(${Math.min(cr + 40, 255)},${Math.min(cg + 40, 255)},${Math.min(cb + 40, 255)},0.3)`;
    ctx.lineWidth = Math.max(1, r * 0.04);
    ctx.beginPath();
    ctx.arc(cx, cy, r * 0.95, 0, Math.PI * 2);
    ctx.stroke();

    // Nucleus
    const nucR = r * 0.22;
    const nucGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, nucR);
    nucGrad.addColorStop(0, `rgba(255,255,255,0.6)`);
    nucGrad.addColorStop(0.4, `rgba(${cr},${cg},${cb},0.35)`);
    nucGrad.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    ctx.fillStyle = nucGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, nucR, 0, Math.PI * 2);
    ctx.fill();

    // Specular highlight (for larger cells)
    if (r > 20) {
      const hx = cx - r * 0.3;
      const hy = cy - r * 0.3;
      const hR = r * 0.35;
      const specGrad = ctx.createRadialGradient(hx, hy, 0, hx, hy, hR);
      specGrad.addColorStop(0, `rgba(255,255,255,0.25)`);
      specGrad.addColorStop(0.5, `rgba(255,255,255,0.06)`);
      specGrad.addColorStop(1, `rgba(255,255,255,0)`);
      ctx.fillStyle = specGrad;
      ctx.beginPath();
      ctx.arc(hx, hy, hR, 0, Math.PI * 2);
      ctx.fill();
    }

    return PIXI.Texture.from(canvas);
  }

  /* ---------- layer config ---------- */
  const layers = [
    { count: 6,  rMin: 70,  rMax: 120, blur: 6, alpha: 0.06, name: 'back' },
    { count: 8,  rMin: 30,  rMax: 50,  blur: 3, alpha: 0.12, name: 'midBack' },
    { count: 12, rMin: 15,  rMax: 30,  blur: 1, alpha: 0.2,  name: 'midFront' },
    { count: 10, rMin: 4,   rMax: 10,  blur: 0, alpha: 0.35, name: 'front' },
  ];

  const allCells = [];

  function rand(a, b) { return a + Math.random() * (b - a); }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  /* ---------- ambient glow ---------- */
  (function createAmbientGlow() {
    const glowSize = 512;
    const c = document.createElement('canvas');
    c.width = glowSize; c.height = glowSize;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(glowSize / 2, glowSize / 2, 0, glowSize / 2, glowSize / 2, glowSize / 2);
    g.addColorStop(0, 'rgba(60,140,165,0.07)');
    g.addColorStop(0.5, 'rgba(42,110,140,0.03)');
    g.addColorStop(1, 'rgba(42,110,140,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, glowSize, glowSize);
    const tex = PIXI.Texture.from(c);
    const sprite = new PIXI.Sprite(tex);
    sprite.anchor.set(0.5);
    sprite.x = window.innerWidth / 2;
    sprite.y = window.innerHeight / 2;
    sprite.width = Math.max(window.innerWidth, window.innerHeight) * 1.2;
    sprite.height = sprite.width;
    app.stage.addChild(sprite);
    // keep reference to reposition on resize
    window._ambientGlow = sprite;
  })();

  /* ---------- create layers ---------- */
  layers.forEach((cfg) => {
    const container = new PIXI.Container();

    if (cfg.blur > 0) {
      const blurFilter = new PIXI.BlurFilter(cfg.blur);
      blurFilter.quality = 2;
      container.filters = [blurFilter];
    }

    for (let i = 0; i < cfg.count; i++) {
      const r = rand(cfg.rMin, cfg.rMax);
      const color = pick(PALETTE);
      const tex = drawCell(r, color);
      const sprite = new PIXI.Sprite(tex);
      sprite.anchor.set(0.5);
      sprite.x = rand(0, window.innerWidth);
      sprite.y = rand(0, window.innerHeight);
      sprite.alpha = cfg.alpha;

      const cell = {
        sprite,
        r,
        vx: rand(-0.15, 0.15),
        vy: rand(-0.15, 0.15),
        phase: Math.random() * Math.PI * 2,
        breathPhase: Math.random() * Math.PI * 2,
        breathSpeed: rand(0.003, 0.008),
        breathAmp: rand(0.02, 0.06),
        baseAlpha: cfg.alpha,
        layer: cfg.name,
      };

      container.addChild(sprite);
      allCells.push(cell);
    }

    app.stage.addChild(container);
  });

  /* ---------- animation ---------- */
  let elapsed = 0;

  app.ticker.add((delta) => {
    elapsed += delta;
    const W = window.innerWidth;
    const H = window.innerHeight;

    for (let i = 0; i < allCells.length; i++) {
      const c = allCells[i];

      // Brownian drift
      c.vx += Math.sin(elapsed * 0.01 + c.phase) * 0.003;
      c.vy += Math.cos(elapsed * 0.01 + c.phase * 1.3) * 0.003;

      // Damping
      c.vx *= 0.997;
      c.vy *= 0.997;

      // Mouse repulsion
      const dx = c.sprite.x - mouse.x;
      const dy = c.sprite.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 150 && dist > 1) {
        const force = (150 - dist) / 150 * 0.08;
        c.vx += (dx / dist) * force;
        c.vy += (dy / dist) * force;
      }

      // Soft collision (same layer)
      for (let j = i + 1; j < allCells.length; j++) {
        const o = allCells[j];
        if (o.layer !== c.layer) continue;
        const cdx = c.sprite.x - o.sprite.x;
        const cdy = c.sprite.y - o.sprite.y;
        const cDist = Math.sqrt(cdx * cdx + cdy * cdy);
        const minDist = (c.r + o.r) * 0.8;
        if (cDist < minDist && cDist > 0.1) {
          const overlap = (minDist - cDist) / minDist * 0.01;
          const nx = cdx / cDist;
          const ny = cdy / cDist;
          c.vx += nx * overlap;
          c.vy += ny * overlap;
          o.vx -= nx * overlap;
          o.vy -= ny * overlap;
        }
      }

      c.sprite.x += c.vx * delta;
      c.sprite.y += c.vy * delta;

      // Edge wrapping
      const margin = c.r * 2;
      if (c.sprite.x < -margin) c.sprite.x = W + margin;
      if (c.sprite.x > W + margin) c.sprite.x = -margin;
      if (c.sprite.y < -margin) c.sprite.y = H + margin;
      if (c.sprite.y > H + margin) c.sprite.y = -margin;

      // Breathing
      c.breathPhase += c.breathSpeed * delta;
      const breathScale = 1 + Math.sin(c.breathPhase) * c.breathAmp;
      c.sprite.scale.set(breathScale);
    }

    // Reposition ambient glow
    if (window._ambientGlow) {
      window._ambientGlow.x = W / 2;
      window._ambientGlow.y = H / 2;
    }
  });

  /* ---------- resize ---------- */
  window.addEventListener('resize', () => {
    if (window._ambientGlow) {
      const size = Math.max(window.innerWidth, window.innerHeight) * 1.2;
      window._ambientGlow.width = size;
      window._ambientGlow.height = size;
    }
  });
})();
</script>
</body>
</html>
