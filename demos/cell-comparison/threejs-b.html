<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three.js — Variant B: Particle System</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0c1a20; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed; bottom: 16px; left: 20px;
    font-family: 'Lato', sans-serif; font-size: 12px; color: #fff;
    opacity: 0.55; z-index: 10; pointer-events: none;
  }
  .back {
    position: fixed; top: 16px; left: 20px;
    font-family: 'Lato', sans-serif; font-size: 13px;
    color: #4FA3B8; text-decoration: none; z-index: 10;
  }
  .back:hover { text-decoration: underline; }
</style>
</head>
<body>
<a class="back" href="index.html">← Back to Gallery</a>
<div class="label">Three.js — Variant B: Particle System</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  // --- Setup ---
  const renderer = new THREE.WebGLRenderer({ antialias: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x0c1a20);
  document.body.appendChild(renderer.domElement);

  const w = window.innerWidth;
  const h = window.innerHeight;
  const camera = new THREE.OrthographicCamera(-w/2, w/2, h/2, -h/2, 0.1, 1000);
  camera.position.z = 500;

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0c1a20, 0.001);

  // --- Teal palette (0-1) ---
  const palette = [
    [0.31, 0.64, 0.72],
    [0.165, 0.51, 0.61],
    [0.165, 0.39, 0.49],
    [0.235, 0.549, 0.647],
    [0.353, 0.667, 0.745],
    [0.275, 0.588, 0.686]
  ];

  // --- Layer definitions ---
  const layers = [
    { count: 6,  sizeMin: 140, sizeMax: 260, opMin: 0.03, opMax: 0.05, layer: 0 },
    { count: 12, sizeMin: 40,  sizeMax: 90,  opMin: 0.08, opMax: 0.15, layer: 1 },
    { count: 18, sizeMin: 20,  sizeMax: 50,  opMin: 0.15, opMax: 0.25, layer: 2 },
    { count: 20, sizeMin: 6,   sizeMax: 18,  opMin: 0.20, opMax: 0.40, layer: 3 }
  ];

  const totalCount = layers.reduce((s, l) => s + l.count, 0); // 56

  // --- Build attributes ---
  const positions = new Float32Array(totalCount * 3);
  const sizes = new Float32Array(totalCount);
  const colors = new Float32Array(totalCount * 3);
  const opacities = new Float32Array(totalCount);
  const phases = new Float32Array(totalCount);
  const layerAttr = new Float32Array(totalCount);

  // Velocities for brownian drift (JS-side)
  const vx = new Float32Array(totalCount);
  const vy = new Float32Array(totalCount);
  const baseSpeed = new Float32Array(totalCount); // per-layer speed multiplier

  function rand(min, max) { return min + Math.random() * (max - min); }

  let idx = 0;
  for (const L of layers) {
    for (let i = 0; i < L.count; i++) {
      const ci = idx;
      positions[ci * 3]     = rand(-w/2, w/2);
      positions[ci * 3 + 1] = rand(-h/2, h/2);
      positions[ci * 3 + 2] = -L.layer * 50; // depth separation

      sizes[ci] = rand(L.sizeMin, L.sizeMax);
      opacities[ci] = rand(L.opMin, L.opMax);
      phases[ci] = Math.random() * Math.PI * 2;
      layerAttr[ci] = L.layer;

      const col = palette[Math.floor(Math.random() * palette.length)];
      colors[ci * 3]     = col[0];
      colors[ci * 3 + 1] = col[1];
      colors[ci * 3 + 2] = col[2];

      // Speed: back layers very slow, front faster
      const speedMul = [0.08, 0.2, 0.45, 0.8][L.layer];
      baseSpeed[ci] = speedMul;
      vx[ci] = (Math.random() - 0.5) * speedMul;
      vy[ci] = (Math.random() - 0.5) * speedMul;

      idx++;
    }
  }

  // --- Geometry ---
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
  geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));
  geometry.setAttribute('aOpacity', new THREE.BufferAttribute(opacities, 1));
  geometry.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));
  geometry.setAttribute('aLayer', new THREE.BufferAttribute(layerAttr, 1));

  // --- Shaders ---
  const vertexShader = `
    attribute float aSize;
    attribute float aOpacity;
    attribute float aPhase;
    attribute vec3 aColor;
    attribute float aLayer;

    varying float vOpacity;
    varying vec3 vColor;
    varying float vLayer;

    uniform float uTime;

    void main() {
      vColor = aColor;
      vOpacity = aOpacity;
      vLayer = aLayer;

      // Breathing
      float breath = 1.0 + sin(uTime * 0.002 + aPhase) * 0.04;

      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      gl_Position = projectionMatrix * mvPos;
      gl_PointSize = aSize * breath;
    }
  `;

  const fragmentShader = `
    varying float vOpacity;
    varying vec3 vColor;
    varying float vLayer;

    void main() {
      vec2 uv = gl_PointCoord;
      float dist = length(uv - 0.5) * 2.0;

      if (dist > 1.4) discard;

      // Outer glow
      float glow = smoothstep(1.4, 0.3, dist) * vOpacity * 0.35;

      // Body gradient
      float body = smoothstep(1.0, 0.0, dist) * vOpacity * 0.45;
      // Brighter center
      float innerBright = smoothstep(0.6, 0.0, dist) * vOpacity * 0.15;

      // Edge stroke
      float edge = smoothstep(0.02, 0.0, abs(dist - 0.95)) * vOpacity * 0.15;

      // Nucleus
      float nucleus = smoothstep(0.22, 0.0, dist) * vOpacity * 0.45;

      // Specular highlight (off-center)
      vec2 specUV = uv - vec2(0.36, 0.36);
      float spec = smoothstep(0.12, 0.0, length(specUV)) * vOpacity * 0.2;

      // Skip fine detail for back layers
      float detailMask = step(0.5, vLayer);

      vec3 bodyColor = vColor * (glow + body + innerBright + edge * detailMask);
      vec3 brightColor = vec3(1.0) * (nucleus * detailMask + spec * detailMask);

      float alpha = glow + body + innerBright + edge * detailMask + nucleus * detailMask + spec * detailMask;

      gl_FragColor = vec4(bodyColor + brightColor, alpha);
    }
  `;

  // --- Material ---
  const material = new THREE.ShaderMaterial({
    vertexShader,
    fragmentShader,
    uniforms: {
      uTime: { value: 0 }
    },
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });

  const points = new THREE.Points(geometry, material);
  scene.add(points);

  // --- Mouse ---
  let mouse = { x: 99999, y: 99999 };
  window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX - w / 2;
    mouse.y = -(e.clientY - h / 2);
  });
  window.addEventListener('mouseleave', () => {
    mouse.x = 99999;
    mouse.y = 99999;
  });

  // --- Visibility ---
  let paused = false;
  document.addEventListener('visibilitychange', () => {
    paused = document.hidden;
  });

  // --- Resize ---
  function onResize() {
    const nw = window.innerWidth;
    const nh = window.innerHeight;
    renderer.setSize(nw, nh);
    camera.left = -nw / 2;
    camera.right = nw / 2;
    camera.top = nh / 2;
    camera.bottom = -nh / 2;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', onResize);

  // --- Animation ---
  let time = 0;
  const posAttr = geometry.attributes.position;
  const hw = w / 2 + 200; // wrap margin
  const hh = h / 2 + 200;

  function animate() {
    requestAnimationFrame(animate);
    if (paused) return;

    time += 16; // ~60fps step
    material.uniforms.uTime.value = time;

    for (let i = 0; i < totalCount; i++) {
      const ix = i * 3;
      const iy = i * 3 + 1;

      // Brownian drift with sin/cos perturbation
      const sp = baseSpeed[i];
      const px = positions[ix];
      const py = positions[iy];

      positions[ix] += vx[i] + Math.sin(time * 0.0003 + phases[i]) * sp * 0.3;
      positions[iy] += vy[i] + Math.cos(time * 0.00025 + phases[i] * 1.3) * sp * 0.25;

      // Slowly evolve velocities
      vx[i] += (Math.random() - 0.5) * 0.005 * sp;
      vy[i] += (Math.random() - 0.5) * 0.005 * sp;
      // Dampen
      vx[i] *= 0.998;
      vy[i] *= 0.998;

      // Mouse repulsion
      const dx = positions[ix] - mouse.x;
      const dy = positions[iy] - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 150 && dist > 0.1) {
        const force = (150 - dist) / 150 * 1.5;
        positions[ix] += (dx / dist) * force;
        positions[iy] += (dy / dist) * force;
      }

      // Edge wrapping
      if (positions[ix] > hw) positions[ix] = -hw;
      if (positions[ix] < -hw) positions[ix] = hw;
      if (positions[iy] > hh) positions[iy] = -hh;
      if (positions[iy] < -hh) positions[iy] = hh;
    }

    posAttr.needsUpdate = true;
    renderer.render(scene, camera);
  }

  animate();
})();
</script>
</body>
</html>
