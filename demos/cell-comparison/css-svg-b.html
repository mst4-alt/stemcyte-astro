  /* ── Base ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0c1a20;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Lato', sans-serif;
    position: relative;
  }

  /* ── Hidden SVG definitions ── */
  .svg-defs {
    position: absolute;
    width: 0;
    height: 0;
    overflow: hidden;
  }

  /* ── Cell base ── */
  .cell {
    position: absolute;
    border-radius: 50%;
    contain: strict;
    will-change: transform;
  }

  /* ── Back layer: 4 large cells ── */
  .back .cell { filter: blur(8px); opacity: 0.04; }

  /* ── Mid layer: 10 medium cells ── */
  .mid .cell { filter: blur(3px); opacity: 0.15; }

  /* ── Front layer: 6 small cells ── */
  .front .cell { filter: blur(0.5px); opacity: 0.3; }

  /* ── Cell inner structure via SVG background ── */
  .cell svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  @keyframes s1 { from { --s1: 0.85; } to { --s1: 1.1; } }
